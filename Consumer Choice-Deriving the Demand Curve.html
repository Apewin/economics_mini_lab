<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumer Choice — Deriving the Demand Curve</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f7f7f5;
            font-family: 'Source Sans Pro', 'Segoe UI', system-ui, sans-serif;
            color: #333;
            padding: 24px 16px;
            margin: 0;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d4d4d0;
            padding: 28px 32px;
        }

        h2 {
            font-family: 'Merriweather', 'Georgia', serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a2a3a;
            border-bottom: 2px solid #1a2a3a;
            padding-bottom: 8px;
            margin: 0 0 12px 0;
        }

        .chart-box { width: 100%; height: 400px; margin: 12px 0; }
        .chart-box-sm { width: 100%; height: 300px; margin: 12px 0; }

        .source {
            font-size: 10px;
            color: #888;
            border-top: 1px solid #e0e0e0;
            padding-top: 8px;
            margin-top: 16px;
        }

        /* Controls */
        .controls-section { margin-top: 16px; border-top: 1px solid #e0e0e0; padding-top: 16px; }

        .radio-group { display: flex; gap: 24px; margin-bottom: 14px; }
        .radio-group label {
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #333;
        }
        .radio-group input[type="radio"] { cursor: pointer; accent-color: #1a5276; }

        .slider-group { margin-bottom: 12px; }
        .slider-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1a2a3a;
            margin-bottom: 4px;
        }

        .slider-row { display: flex; align-items: center; gap: 10px; }
        .slider-row input[type="range"] {
            flex: 1;
            cursor: pointer;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #d4d4d0;
            border-radius: 0;
            outline: none;
        }
        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #1a5276;
            border: 2px solid #fff;
            border-radius: 0;
            cursor: pointer;
        }
        .slider-row input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #1a5276;
            border: 2px solid #fff;
            border-radius: 0;
            cursor: pointer;
        }

        .slider-val {
            font-size: 13px;
            font-weight: 600;
            color: #1a5276;
            min-width: 52px;
            text-align: right;
        }

        .reset-btn {
            background: #d4d4d0;
            color: #333;
            border: none;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Source Sans Pro', sans-serif;
            cursor: pointer;
            margin-top: 8px;
        }
        .reset-btn:hover { background: #bbb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Consumer Choice — Deriving the Demand Curve</h2>

        <!-- Chart 1: Consumer Equilibrium -->
        <div id="eqChart" class="chart-box"></div>

        <!-- Chart 2: Derived Demand Curve -->
        <div id="demandChart" class="chart-box-sm"></div>

        <!-- Controls -->
        <div class="controls-section">
            <div class="radio-group">
                <label><input type="radio" name="goodType" value="normal" checked> Normal Good</label>
                <label><input type="radio" name="goodType" value="inferior"> Inferior Good</label>
            </div>

            <div class="slider-group">
                <label for="priceX">Price of Good X (P<sub>x</sub>)</label>
                <div class="slider-row">
                    <input type="range" id="priceX" min="1.5" max="9.5" step="0.05" value="5">
                    <span class="slider-val" id="priceXVal">$5.00</span>
                </div>
            </div>

            <div class="slider-group">
                <label for="income">Consumer Income (I)</label>
                <div class="slider-row">
                    <input type="range" id="income" min="70" max="140" step="1" value="100">
                    <span class="slider-val" id="incomeVal">$100</span>
                </div>
            </div>

            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <div class="source">
            © 2026 Teaching Tool for AP/IB/A-Level Economics. Dr.Jia — All rights reserved.
        </div>
    </div>

    <script>
    (function () {
        /* ── Constants ── */
        const Py = 5, Px_init = 5, I_init = 100;

        /* ── Economics Engine (unchanged) ── */
        function getCoordinates(Px, I, type) {
            let xA = 10, yA = 10;
            let xB, yB, xC, yC, ic0_params, ic1_params;

            if (type === 'normal') {
                xC = 0.5 * I / Px;
                yC = 0.5 * I / Py;
                ic0_params = { x0: 0, y0: 0, k: 100 };
                xB = Math.sqrt(100 * Py / Px);
                yB = 100 / xB;
                ic1_params = { x0: 0, y0: 0, k: xC * yC };
            } else {
                xC = 10 * Math.pow(5 / Px, 0.8) * Math.pow(100 / I, 1.5);
                yC = (I - Px * xC) / Py;
                let c0 = 25;
                ic0_params = {
                    x0: xA - c0,
                    y0: yA - c0 * (Px_init / Py),
                    k: c0 * c0 * (Px_init / Py)
                };
                xB = Math.sqrt(ic0_params.k * Py / Px) + ic0_params.x0;
                yB = ic0_params.y0 + ic0_params.k / (xB - ic0_params.x0);
                let c1 = 25 * Math.sqrt(5 / Px);
                ic1_params = {
                    x0: xC - c1,
                    y0: yC - c1 * (Px / Py),
                    k: c1 * c1 * (Px / Py)
                };
            }
            return { xA, yA, xB, yB, xC, yC, ic0_params, ic1_params };
        }

        function generateICPoints(params, max_x) {
            let pts = [];
            let startX = Math.max(0.1, params.x0 + 0.1);
            for (let x = startX; x <= max_x; x += 0.5) {
                let y = params.y0 + params.k / (x - params.x0);
                if (y > -2 && y <= 40) pts.push([x, y]);
            }
            return pts;
        }

        /* ── Chart Instances ── */
        const eqChart = echarts.init(document.getElementById('eqChart'));
        const deChart = echarts.init(document.getElementById('demandChart'));

        /* ── Equilibrium Chart Option ── */
        const eqOption = {
            animation: false,
            tooltip: { show: false },
            legend: {
                top: 0,
                left: 'center',
                itemWidth: 24,
                itemHeight: 3,
                textStyle: { fontFamily: 'Source Sans Pro, sans-serif', fontSize: 11, color: '#333' },
                data: [
                    { name: 'BL₀ (Initial)', icon: 'line' },
                    { name: 'IC₀ (Initial)', icon: 'line' },
                    { name: 'BL₁ (New)', icon: 'line' },
                    { name: 'IC₁ (New)', icon: 'line' },
                    { name: 'Compensated BL', icon: 'line' }
                ]
            },
            grid: { left: 58, right: 30, top: 40, bottom: 54 },
            xAxis: {
                type: 'value',
                min: 0,
                max: 45,
                name: 'Quantity of Good X',
                nameLocation: 'middle',
                nameGap: 34,
                nameTextStyle: { fontFamily: 'Source Sans Pro, sans-serif', fontWeight: 600, fontSize: 13, color: '#1a2a3a' },
                axisLabel: { fontFamily: 'Source Sans Pro, sans-serif', fontSize: 11, color: '#555' },
                axisLine: { lineStyle: { color: '#bbb' } },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                min: 0,
                max: 28,
                name: 'Quantity of Good Y',
                nameLocation: 'middle',
                nameGap: 42,
                nameTextStyle: { fontFamily: 'Source Sans Pro, sans-serif', fontWeight: 600, fontSize: 13, color: '#1a2a3a' },
                axisLabel: { fontFamily: 'Source Sans Pro, sans-serif', fontSize: 11, color: '#555' },
                axisLine: { lineStyle: { color: '#bbb' } },
                splitLine: { show: false }
            },
            series: [
                /* 0 – BL₀ initial budget line (dashed) */
                {
                    name: 'BL₀ (Initial)',
                    type: 'line',
                    data: [[0, I_init / Py], [I_init / Px_init, 0]],
                    lineStyle: { color: '#bbb', width: 1.5, type: 'dashed' },
                    symbol: 'none',
                    z: 2
                },
                /* 1 – IC₀ initial indifference curve (dashed) */
                {
                    name: 'IC₀ (Initial)',
                    type: 'line',
                    data: [],
                    lineStyle: { color: '#1a5276', width: 1.5, type: 'dashed' },
                    symbol: 'none',
                    smooth: false,
                    z: 2
                },
                /* 2 – BL₁ current budget line (solid) */
                {
                    name: 'BL₁ (New)',
                    type: 'line',
                    data: [],
                    lineStyle: { color: '#b85c38', width: 2.5 },
                    symbol: 'none',
                    z: 2
                },
                /* 3 – IC₁ current indifference curve (solid) */
                {
                    name: 'IC₁ (New)',
                    type: 'line',
                    data: [],
                    lineStyle: { color: '#1a5276', width: 2.5 },
                    symbol: 'none',
                    smooth: false,
                    z: 2
                },
                /* 4 – Compensated budget line */
                {
                    name: 'Compensated BL',
                    type: 'line',
                    data: [],
                    lineStyle: { color: '#5a3d7a', width: 1.5, type: 'dashed' },
                    symbol: 'none',
                    z: 2
                },
                /* 5 – Mark areas (sub + income effect zones) */
                {
                    name: 'effects',
                    type: 'line',
                    data: [],
                    symbol: 'none',
                    lineStyle: { width: 0 },
                    z: 0,
                    markArea: {
                        silent: true,
                        data: [
                            [
                                {
                                    name: 'Substitution Effect',
                                    xAxis: 10,
                                    yAxis: 0,
                                    itemStyle: { color: 'rgba(90,61,122,0.10)' },
                                    label: {
                                        show: true,
                                        position: 'insideTop',
                                        formatter: 'Substitution',
                                        fontFamily: 'Source Sans Pro, sans-serif',
                                        fontSize: 11,
                                        fontWeight: 600,
                                        color: '#5a3d7a'
                                    }
                                },
                                { xAxis: 10, yAxis: 0 }
                            ],
                            [
                                {
                                    name: 'Income Effect',
                                    xAxis: 10,
                                    yAxis: 0,
                                    itemStyle: { color: 'rgba(61,107,79,0.10)' },
                                    label: {
                                        show: true,
                                        position: 'insideTop',
                                        formatter: 'Income',
                                        fontFamily: 'Source Sans Pro, sans-serif',
                                        fontSize: 11,
                                        fontWeight: 600,
                                        color: '#3d6b4f'
                                    }
                                },
                                { xAxis: 10, yAxis: 0 }
                            ]
                        ]
                    }
                },
                /* 6 – Points A, B, C */
                {
                    name: 'points',
                    type: 'scatter',
                    data: [],
                    symbolSize: 12,
                    z: 3,
                    label: {
                        show: true,
                        position: 'right',
                        offset: [8, 0],
                        fontFamily: 'Source Sans Pro, sans-serif',
                        fontSize: 13,
                        fontWeight: 700
                    },
                    itemStyle: {}
                }
            ]
        };
        eqChart.setOption(eqOption);

        /* ── Demand Chart Option ── */
        const deOption = {
            animation: false,
            tooltip: { show: false },
            legend: {
                top: 0,
                left: 'center',
                itemWidth: 24,
                itemHeight: 3,
                textStyle: { fontFamily: 'Source Sans Pro, sans-serif', fontSize: 11, color: '#333' },
                data: [
                    { name: 'Demand (I = $100)', icon: 'line' },
                    { name: 'Demand (Current I)', icon: 'line' },
                    { name: 'Current (Q, P)', icon: 'circle' }
                ]
            },
            grid: { left: 58, right: 30, top: 40, bottom: 54 },
            xAxis: {
                type: 'value',
                min: 0,
                max: 45,
                name: 'Quantity Demanded (Qx)',
                nameLocation: 'middle',
                nameGap: 34,
                nameTextStyle: { fontFamily: 'Source Sans Pro, sans-serif', fontWeight: 600, fontSize: 13, color: '#1a2a3a' },
                axisLabel: { fontFamily: 'Source Sans Pro, sans-serif', fontSize: 11, color: '#555' },
                axisLine: { lineStyle: { color: '#bbb' } },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                min: 0,
                max: 11,
                name: 'Price of Good X (Px)',
                nameLocation: 'middle',
                nameGap: 42,
                nameTextStyle: { fontFamily: 'Source Sans Pro, sans-serif', fontWeight: 600, fontSize: 13, color: '#1a2a3a' },
                axisLabel: { fontFamily: 'Source Sans Pro, sans-serif', fontSize: 11, color: '#555' },
                axisLine: { lineStyle: { color: '#bbb' } },
                splitLine: { show: false }
            },
            series: [
                /* 0 – Initial demand curve (dashed gray, at I_init) */
                {
                    name: 'Demand (I = $100)',
                    type: 'line',
                    data: [],
                    lineStyle: { color: '#bbb', width: 1.5, type: 'dashed' },
                    symbol: 'none',
                    z: 2
                },
                /* 1 – Current demand curve (solid deepBlue) */
                {
                    name: 'Demand (Current I)',
                    type: 'line',
                    data: [],
                    lineStyle: { color: '#1a5276', width: 2.5 },
                    symbol: 'none',
                    z: 2
                },
                /* 2 – Current price-quantity point */
                {
                    name: 'Current (Q, P)',
                    type: 'scatter',
                    data: [],
                    symbolSize: 12,
                    itemStyle: { color: '#b85c38' },
                    label: {
                        show: true,
                        position: 'right',
                        offset: [8, 0],
                        fontFamily: 'Source Sans Pro, sans-serif',
                        fontSize: 12,
                        fontWeight: 600,
                        color: '#b85c38',
                        formatter: function (p) { return '(' + p.data[0].toFixed(1) + ', $' + p.data[1].toFixed(2) + ')'; }
                    },
                    z: 3
                }
            ]
        };
        deChart.setOption(deOption);

        /* ── Static Demand Curves (at I_init) ── */
        const staticNormalDemand = [], staticInferiorDemand = [];
        for (let p = 1.5; p <= 10; p += 0.2) {
            staticNormalDemand.push([getCoordinates(p, I_init, 'normal').xC, p]);
            staticInferiorDemand.push([getCoordinates(p, I_init, 'inferior').xC, p]);
        }

        /* ── Update Simulation ── */
        function updateSimulation() {
            var Px  = parseFloat(document.getElementById('priceX').value);
            var I   = parseFloat(document.getElementById('income').value);
            var type = document.querySelector('input[name="goodType"]:checked').value;

            document.getElementById('priceXVal').textContent = '$' + Px.toFixed(2);
            document.getElementById('incomeVal').textContent = '$' + I;

            var c = getCoordinates(Px, I, type);
            var xA = c.xA, yA = c.yA, xB = c.xB, yB = c.yB, xC = c.xC, yC = c.yC;

            /* -- Equilibrium chart update -- */
            var subXMin = Math.min(xA, xB), subXMax = Math.max(xA, xB);
            var incXMin = Math.min(xB, xC), incXMax = Math.max(xB, xC);

            eqChart.setOption({
                series: [
                    { /* 0 – BL₀ */ data: [[0, I_init / Py], [I_init / Px_init, 0]] },
                    { /* 1 – IC₀ */ data: generateICPoints(c.ic0_params, 55) },
                    { /* 2 – BL₁ */ data: [[0, I / Py], [I / Px, 0]] },
                    { /* 3 – IC₁ */ data: generateICPoints(c.ic1_params, 55) },
                    { /* 4 – Compensated BL */ data: [[0, yB + xB * (Px / Py)], [xB + yB * (Py / Px), 0]] },
                    { /* 5 – Mark areas */
                        markArea: { data: [
                            [
                                { name: 'Substitution Effect', xAxis: subXMin, yAxis: 0,
                                  itemStyle: { color: 'rgba(90,61,122,0.10)' },
                                  label: { show: true, position: 'insideTop', formatter: 'Substitution',
                                           fontFamily: 'Source Sans Pro, sans-serif', fontSize: 11, fontWeight: 600, color: '#5a3d7a' }
                                },
                                { xAxis: subXMax, yAxis: 0 }
                            ],
                            [
                                { name: 'Income Effect', xAxis: incXMin, yAxis: 0,
                                  itemStyle: { color: 'rgba(61,107,79,0.10)' },
                                  label: { show: true, position: 'insideTop', formatter: 'Income',
                                           fontFamily: 'Source Sans Pro, sans-serif', fontSize: 11, fontWeight: 600, color: '#3d6b4f' }
                                },
                                { xAxis: incXMax, yAxis: 0 }
                            ]
                        ]}
                    },
                    { /* 6 – Scatter points A, B, C */
                        data: [
                            { value: [xA, yA], itemStyle: { color: '#1a2a3a' }, label: { color: '#1a2a3a', formatter: 'A' } },
                            { value: [xB, yB], itemStyle: { color: '#5a3d7a' }, label: { color: '#5a3d7a', formatter: 'B' } },
                            { value: [xC, yC], itemStyle: { color: '#3d6b4f' }, label: { color: '#3d6b4f', formatter: 'C' } }
                        ]
                    }
                ]
            });

            /* -- Demand chart update -- */
            var dynamicDemand = [];
            for (var p = 1.5; p <= 10; p += 0.2) {
                dynamicDemand.push([getCoordinates(p, I, type).xC, p]);
            }

            deChart.setOption({
                series: [
                    { /* 0 – Initial demand */ data: (type === 'normal') ? staticNormalDemand : staticInferiorDemand },
                    { /* 1 – Current demand */ data: dynamicDemand },
                    { /* 2 – Current point */  data: [[xC, Px]] }
                ]
            });
        }

        /* ── Reset Button ── */
        document.getElementById('resetBtn').addEventListener('click', function () {
            document.getElementById('priceX').value = 5;
            document.getElementById('income').value = 100;
            updateSimulation();
        });

        /* ── Event Listeners ── */
        document.getElementById('priceX').addEventListener('input', updateSimulation);
        document.getElementById('income').addEventListener('input', updateSimulation);
        document.querySelectorAll('input[name="goodType"]').forEach(function (r) {
            r.addEventListener('change', updateSimulation);
        });

        /* ── Responsive Resize ── */
        window.addEventListener('resize', function () {
            eqChart.resize();
            deChart.resize();
        });

        /* ── Initial Paint ── */
        updateSimulation();
    })();
    </script>
</body>
</html>
