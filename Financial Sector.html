<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Macro: Financial System Transmission</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f7f7f5;
            font-family: 'Source Sans Pro', 'Segoe UI', system-ui, sans-serif;
            color: #333;
            padding: 24px 16px;
            margin: 0;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d4d4d0;
            padding: 28px 32px;
        }

        h2 {
            font-family: 'Merriweather', 'Georgia', serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a2a3a;
            border-bottom: 2px solid #1a2a3a;
            padding-bottom: 8px;
            margin: 0 0 12px 0;
        }

        .charts-row {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }

        .chart-col {
            flex: 1;
            min-width: 0;
        }

        .chart-title {
            font-family: 'Merriweather', 'Georgia', serif;
            font-size: 13px;
            font-weight: 700;
            color: #1a2a3a;
            text-align: center;
            margin: 0 0 4px 0;
        }

        .chart-box {
            width: 100%;
            height: 320px;
        }

        /* Toggle */
        .toggle-group {
            display: flex;
            margin: 16px 0 8px 0;
            border: 1px solid #d4d4d0;
            overflow: hidden;
        }

        .toggle-btn {
            flex: 1;
            padding: 8px 16px;
            border: none;
            background: #f7f7f5;
            cursor: pointer;
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            transition: all 0.15s;
        }

        .toggle-btn.active {
            background: #1a5276;
            color: #fff;
        }

        .toggle-btn + .toggle-btn {
            border-left: 1px solid #d4d4d0;
        }

        /* Controls */
        .controls-section {
            margin-top: 12px;
        }

        .slider-group {
            margin-bottom: 12px;
        }

        .slider-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1a2a3a;
            margin-bottom: 4px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-row input[type="range"] {
            flex: 1;
            cursor: pointer;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #d4d4d0;
            border-radius: 0;
            outline: none;
        }

        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #1a5276;
            border: 2px solid #fff;
            border-radius: 0;
            cursor: pointer;
        }

        .slider-row input[type="range"]:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .slider-val {
            font-size: 13px;
            font-weight: 600;
            color: #1a5276;
            min-width: 48px;
            text-align: right;
        }

        .slider-group.disabled-group {
            opacity: 0.35;
        }

        .slider-group.disabled-group label {
            color: #888;
        }

        /* Source */
        .source {
            font-size: 10px;
            color: #888;
            border-top: 1px solid #e0e0e0;
            padding-top: 8px;
            margin-top: 16px;
        }

        /* Legend strip */
        .legend-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 8px 0 4px 0;
            font-size: 12px;
            color: #555;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-line {
            width: 20px;
            height: 0;
            border-top: 2.5px solid;
            display: inline-block;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            background: #1a2a3a;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px #1a2a3a;
            display: inline-block;
        }

        /* Responsive: stack charts on narrow screens */
        @media (max-width: 720px) {
            .charts-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Financial Sector — Monetary Policy Transmission</h2>

    <div class="legend-strip">
        <span class="legend-item"><span class="legend-line" style="border-color:#1a5276;"></span> Demand (Rd / MD / LF-D)</span>
        <span class="legend-item"><span class="legend-line" style="border-color:#b85c38;"></span> Supply (Rs / MS / LF-S)</span>
        <span class="legend-item"><span class="legend-dot"></span> Equilibrium</span>
    </div>

    <div class="charts-row">
        <div class="chart-col">
            <p class="chart-title">Market for Reserves</p>
            <div id="chartReserve" class="chart-box"></div>
        </div>
        <div class="chart-col">
            <p class="chart-title">Money Market</p>
            <div id="chartMoney" class="chart-box"></div>
        </div>
        <div class="chart-col">
            <p class="chart-title">Loanable Funds Market</p>
            <div id="chartLF" class="chart-box"></div>
        </div>
    </div>

    <!-- Toggle -->
    <div class="toggle-group">
        <button class="toggle-btn active" id="btnLimited">Limited Reserves</button>
        <button class="toggle-btn" id="btnAmple">Ample Reserves</button>
    </div>

    <!-- Controls -->
    <div class="controls-section">
        <div class="slider-group">
            <label>Open Market Operations (Reserve Supply): <span id="valOMO" style="color:#1a5276;">100</span></label>
            <div class="slider-row">
                <input type="range" id="inpOMO" min="20" max="180" step="5" value="100">
                <span class="slider-val" id="dispOMO">100</span>
            </div>
        </div>
        <div class="slider-group disabled-group" id="iorbGroup">
            <label>Administered Rate (IORB): <span id="valIORB" style="color:#3d6b4f;">4.0%</span></label>
            <div class="slider-row">
                <input type="range" id="inpIORB" min="1.0" max="8.0" step="0.5" value="4.0" disabled>
                <span class="slider-val" id="dispIORB">4.0%</span>
            </div>
        </div>
    </div>

    <div class="source">© 2026 Economics Visualization — Dr. Jia Edition · Textbook interactive built with Apache ECharts</div>
</div>

<script>
(function () {
    /* ── colour palette ────────────────────────────────────────────── */
    const C = {
        deepBlue:   '#1a5276',
        ochre:      '#b85c38',
        darkPurple: '#5a3d7a',
        green:      '#3d6b4f',
        gray:       '#bbb',
        titleText:  '#1a2a3a',
        gridLine:   '#e8e8e8'
    };

    /* ── DOM refs ──────────────────────────────────────────────────── */
    const elChartReserve = document.getElementById('chartReserve');
    const elChartMoney   = document.getElementById('chartMoney');
    const elChartLF      = document.getElementById('chartLF');
    const elInpOMO  = document.getElementById('inpOMO');
    const elInpIORB = document.getElementById('inpIORB');
    const elValOMO  = document.getElementById('valOMO');
    const elValIORB = document.getElementById('valIORB');
    const elDispOMO = document.getElementById('dispOMO');
    const elDispIORB = document.getElementById('dispIORB');
    const elIorbGroup = document.getElementById('iorbGroup');
    const elBtnLimited = document.getElementById('btnLimited');
    const elBtnAmple   = document.getElementById('btnAmple');

    /* ── ECharts init ──────────────────────────────────────────────── */
    const resChart = echarts.init(elChartReserve, null, { renderer: 'canvas' });
    const monChart = echarts.init(elChartMoney, null, { renderer: 'canvas' });
    const lfChart  = echarts.init(elChartLF, null, { renderer: 'canvas' });

    /* ── Economics model ───────────────────────────────────────────── */
    let framework = 'limited';
    const PR_BASE = 5.0;

    /* ── axis label graphics helper ────────────────────────────────── */
    function axisLabels(xText, yText) {
        return [
            {
                type: 'text', left: 'center', bottom: 6,
                style: { text: xText, fill: '#555', font: '600 11px "Source Sans Pro", sans-serif' }
            },
            {
                type: 'text', top: 'center', left: 4,
                style: {
                    text: yText, fill: '#555',
                    font: '600 11px "Source Sans Pro", sans-serif'
                },
                rotation: -Math.PI / 2
            }
        ];
    }

    /* ── curve label helper ────────────────────────────────────────── */
    function curveLabel(text, color, x, y, xMax, yMax) {
        const xPct = Math.min(Math.max(x / xMax, 0.05), 0.85);
        const yPct = Math.min(Math.max(y / yMax, 0.08), 0.88);
        return {
            type: 'text',
            left: (xPct * 100) + '%',
            top: ((1 - yPct) * 100) + '%',
            style: {
                text: text,
                fill: color,
                font: 'bold 13px "Source Sans Pro", sans-serif'
            },
            silent: true
        };
    }

    /* ── shared line style helper ──────────────────────────────────── */
    function lineStyle(color, width, dash) {
        return {
            symbol: 'none',
            lineStyle: { color: color, width: width || 2.5, type: dash || 'solid' },
            emphasis: { disabled: true },
            animation: false
        };
    }

    /* ── Generate curve data ───────────────────────────────────────── */
    function genCurve(fn, xMin, xMax, step) {
        const d = [];
        for (let x = xMin; x <= xMax; x += step) d.push([x, fn(x)]);
        return d;
    }

    /* ── Set framework ─────────────────────────────────────────────── */
    function setFramework(mode) {
        framework = mode;
        elBtnLimited.className = mode === 'limited' ? 'toggle-btn active' : 'toggle-btn';
        elBtnAmple.className = mode === 'ample' ? 'toggle-btn active' : 'toggle-btn';

        if (mode === 'limited') {
            elInpOMO.value = 100;
            elInpIORB.disabled = true;
            elIorbGroup.className = 'slider-group disabled-group';
        } else {
            elInpOMO.value = 150;
            elInpIORB.value = 4.0;
            elInpIORB.disabled = false;
            elIorbGroup.className = 'slider-group';
        }
        update();
    }

    elBtnLimited.addEventListener('click', function () { setFramework('limited'); });
    elBtnAmple.addEventListener('click', function () { setFramework('ample'); });

    /* ── Main update ───────────────────────────────────────────────── */
    function update() {
        const omo  = parseFloat(elInpOMO.value);
        const iorb = parseFloat(elInpIORB.value);

        elValOMO.textContent = omo;
        elDispOMO.textContent = omo;
        elValIORB.textContent = iorb.toFixed(1) + '%';
        elDispIORB.textContent = iorb.toFixed(1) + '%';

        /* ── Reserve Market ────────────────────────────────────────── */
        let policyRate;
        const rdFn = (x) => 10 - x * 0.05;
        const rdData = genCurve(rdFn, 0, 200, 5);
        const rsData = [[omo, 0], [omo, 10]];

        if (framework === 'limited') {
            policyRate = Math.max(0, 10 - omo * 0.05);
        } else {
            policyRate = Math.max(iorb, 10 - omo * 0.05);
        }

        let reserveEqLabel = 'Eq';
        if (framework === 'ample') {
            reserveEqLabel = (10 - omo * 0.05 > iorb) ? 'Eq (Scarcity)' : 'Eq (IORB)';
        }

        // In Ample mode, Rd is kinked at IORB
        let resDemandData;
        if (framework === 'ample') {
            resDemandData = [];
            for (let x = 0; x <= 200; x += 5) {
                resDemandData.push([x, Math.max(iorb, 10 - x * 0.05)]);
            }
        } else {
            resDemandData = rdData;
        }

        const reserveLabels = [
            curveLabel('Rd', C.deepBlue, 30, 8.5, 200, 10),
            curveLabel('Rs', C.ochre, Math.min(omo + 15, 190), 9.3, 200, 10)
        ];

        // Equilibrium label
        reserveLabels.push({
            type: 'text',
            left: Math.min(((omo + 8) / 200) * 100, 88) + '%',
            top: ((1 - policyRate / 10) * 100 - 5) + '%',
            style: {
                text: reserveEqLabel + '\n' + policyRate.toFixed(1) + '%',
                fill: C.titleText,
                font: 'bold 12px "Source Sans Pro", sans-serif',
                textAlign: 'left'
            },
            silent: true
        });

        resChart.setOption({
            animation: false,
            grid: { left: 55, right: 25, top: 30, bottom: 55 },
            xAxis: {
                type: 'value', min: 0, max: 200,
                axisLine: { lineStyle: { color: '#999' } },
                splitLine: { lineStyle: { color: C.gridLine } },
                axisLabel: { fontSize: 10, color: '#666' }
            },
            yAxis: {
                type: 'value', min: 0, max: 10,
                axisLine: { lineStyle: { color: '#999' } },
                splitLine: { lineStyle: { color: C.gridLine } },
                axisLabel: { fontSize: 10, color: '#666', formatter: '{value}%' }
            },
            series: [
                {
                    name: 'Rd', type: 'line', data: resDemandData,
                    ...lineStyle(C.deepBlue, 2.5)
                },
                {
                    name: 'Rs', type: 'line', data: rsData,
                    ...lineStyle(C.ochre, 2.5)
                },
                {
                    name: 'Eq', type: 'scatter', data: [[omo, policyRate]],
                    symbolSize: 10,
                    itemStyle: { color: C.titleText, borderColor: '#fff', borderWidth: 2 },
                    emphasis: { disabled: true },
                    animation: false
                }
            ],
            graphic: [
                ...axisLabels('Quantity of Reserves', 'Policy Rate (i_ff %)'),
                ...reserveLabels
            ],
            legend: { show: false }
        }, true);

        /* ── Money Market ──────────────────────────────────────────── */
        const deltaRate = policyRate - PR_BASE;
        let msPosition = 100 - deltaRate * 20;
        if (msPosition < 10) msPosition = 10;
        const nominalRate = 11 - msPosition * 0.05;

        const mdFn = (x) => 11 - x * 0.05;
        const mdData = genCurve(mdFn, 0, 200, 5);
        const msData = [[msPosition, 0], [msPosition, 10]];

        const moneyLabels = [
            curveLabel('MD', C.deepBlue, 160, 3, 200, 10),
            curveLabel('MS', C.ochre, Math.min(msPosition + 15, 190), 9.3, 200, 10)
        ];

        moneyLabels.push({
            type: 'text',
            left: Math.min(((msPosition + 8) / 200) * 100, 88) + '%',
            top: ((1 - nominalRate / 10) * 100 - 5) + '%',
            style: {
                text: 'Eq\ni = ' + nominalRate.toFixed(1) + '%',
                fill: C.titleText,
                font: 'bold 12px "Source Sans Pro", sans-serif',
                textAlign: 'left'
            },
            silent: true
        });

        monChart.setOption({
            animation: false,
            grid: { left: 55, right: 25, top: 30, bottom: 55 },
            xAxis: {
                type: 'value', min: 0, max: 200,
                axisLine: { lineStyle: { color: '#999' } },
                splitLine: { lineStyle: { color: C.gridLine } },
                axisLabel: { fontSize: 10, color: '#666' }
            },
            yAxis: {
                type: 'value', min: 0, max: 10,
                axisLine: { lineStyle: { color: '#999' } },
                splitLine: { lineStyle: { color: C.gridLine } },
                axisLabel: { fontSize: 10, color: '#666', formatter: '{value}%' }
            },
            series: [
                {
                    name: 'MD', type: 'line', data: mdData,
                    ...lineStyle(C.deepBlue, 2.5)
                },
                {
                    name: 'MS', type: 'line', data: msData,
                    ...lineStyle(C.ochre, 2.5)
                },
                {
                    name: 'Eq', type: 'scatter', data: [[msPosition, nominalRate]],
                    symbolSize: 10,
                    itemStyle: { color: C.titleText, borderColor: '#fff', borderWidth: 2 },
                    emphasis: { disabled: true },
                    animation: false
                }
            ],
            graphic: [
                ...axisLabels('Quantity of Money', 'Nominal Interest Rate (i %)'),
                ...moneyLabels
            ],
            legend: { show: false }
        }, true);

        /* ── Loanable Funds Market ─────────────────────────────────── */
        const lfShiftY = deltaRate;
        const lfEqQ = 100 - 10 * lfShiftY;
        const realRate = 4 + 0.5 * lfShiftY;

        const lfDFn = (x) => 9 - x * 0.05;
        const lfSFn = (x) => x * 0.05 - 1 + lfShiftY;
        const lfDData = genCurve(lfDFn, 0, 200, 5);
        const lfSData = genCurve(lfSFn, 0, 200, 5);

        const lfLabels = [
            curveLabel('LF-D', C.deepBlue, 160, 1.5, 200, 10),
            curveLabel('LF-S', C.ochre, 160, Math.min(lfSFn(160), 9.5), 200, 10)
        ];

        // Clamp equilibrium label position
        const lfEqLabelY = Math.min(Math.max(realRate, 0.5), 9.5);
        lfLabels.push({
            type: 'text',
            left: Math.min(Math.max(((lfEqQ + 8) / 200) * 100, 10), 85) + '%',
            top: ((1 - lfEqLabelY / 10) * 100 - 5) + '%',
            style: {
                text: 'Eq\nr = ' + realRate.toFixed(1) + '%',
                fill: C.titleText,
                font: 'bold 12px "Source Sans Pro", sans-serif',
                textAlign: 'left'
            },
            silent: true
        });

        lfChart.setOption({
            animation: false,
            grid: { left: 55, right: 25, top: 30, bottom: 55 },
            xAxis: {
                type: 'value', min: 0, max: 200,
                axisLine: { lineStyle: { color: '#999' } },
                splitLine: { lineStyle: { color: C.gridLine } },
                axisLabel: { fontSize: 10, color: '#666' }
            },
            yAxis: {
                type: 'value', min: 0, max: 10,
                axisLine: { lineStyle: { color: '#999' } },
                splitLine: { lineStyle: { color: C.gridLine } },
                axisLabel: { fontSize: 10, color: '#666', formatter: '{value}%' }
            },
            series: [
                {
                    name: 'LF-D', type: 'line', data: lfDData,
                    ...lineStyle(C.deepBlue, 2.5)
                },
                {
                    name: 'LF-S', type: 'line', data: lfSData,
                    ...lineStyle(C.ochre, 2.5)
                },
                {
                    name: 'Eq', type: 'scatter',
                    data: [[lfEqQ, realRate]],
                    symbolSize: 10,
                    itemStyle: { color: C.titleText, borderColor: '#fff', borderWidth: 2 },
                    emphasis: { disabled: true },
                    animation: false
                }
            ],
            graphic: [
                ...axisLabels('Quantity of Loanable Funds', 'Real Interest Rate (r %)'),
                ...lfLabels
            ],
            legend: { show: false }
        }, true);
    }

    /* ── Event listeners ───────────────────────────────────────────── */
    elInpOMO.addEventListener('input', update);
    elInpIORB.addEventListener('input', update);

    /* ── Resize handler ────────────────────────────────────────────── */
    window.addEventListener('resize', function () {
        resChart.resize();
        monChart.resize();
        lfChart.resize();
    });

    /* ── Initial render ────────────────────────────────────────────── */
    update();
})();
</script>
</body>
</html>
