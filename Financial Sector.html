<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Macro: Financial System Transmission</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --panel-bg: #ffffff;
            --primary-dark: #2c3e50;
            --accent-blue: #2980b9;
            --accent-green: #27ae60;
            --accent-purple: #8e44ad;
            --border-color: #dcdde1;
            --text-muted: #7f8c8d;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-color); color: var(--primary-dark);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 主体图表容器上移，占据主要空间 */
        .main-container {
            flex: 1; display: flex; flex-direction: row; padding: 20px; gap: 15px; min-height: 0;
        }

        .chart-box {
            flex: 1; background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; min-width: 0; position: relative;
        }
        /* 增大图表标题字号并增加下边距 */
        .chart-box h3 { 
            margin: 0 0 10px 0; font-size: 1.3rem; text-align: center; color: #34495e; 
            border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; 
        }
        .chart-wrapper { flex: 1; position: relative; min-height: 0; }
        
        .transmission-arrow {
            display: flex; align-items: center; justify-content: center; width: 20px; color: #bdc3c7; font-size: 2rem;
        }

        /* 控制面板下沉 */
        .toolbar {
            background: white; padding: 15px 25px; border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; gap: 20px;
        }

        .toggle-group {
            display: flex; background: #ecf0f1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color);
        }
        /* 增大按钮字号 */
        .toggle-btn {
            padding: 10px 20px; border: none; background: transparent; cursor: pointer;
            font-size: 1rem; font-weight: 600; color: var(--text-muted); transition: all 0.2s;
        }
        .toggle-btn.active { background: var(--primary-dark); color: white; }

        .controls-container {
            display: flex; gap: 30px; flex: 1; justify-content: flex-end; align-items: center;
        }
        /* 增加容器宽度以防止文字换行 */
        .control-item { display: flex; flex-direction: column; width: 350px; }
        /* 增大说明文字字号 */
        .control-header { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent-blue); height: 6px; }
        input[type="range"]:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 页脚版权声明 */
        footer {
            text-align: center; font-size: 0.8rem; color: var(--text-muted);
            padding: 8px; background: white;
        }
    </style>
</head>
<body>

<div class="main-container">
    <!-- Chart 1: Reserve Market -->
    <div class="chart-box">
        <h3>Market for Reserves</h3>
        <div class="chart-wrapper"><canvas id="reserveChart"></canvas></div>
    </div>
    
    <div class="transmission-arrow">➔</div>

    <!-- Chart 2: Money Market -->
    <div class="chart-box">
        <h3>Money Market</h3>
        <div class="chart-wrapper"><canvas id="moneyChart"></canvas></div>
    </div>
    
    <div class="transmission-arrow">➔</div>

    <!-- Chart 3: Loanable Funds Market -->
    <div class="chart-box">
        <h3>Loanable Funds Market</h3>
        <div class="chart-wrapper"><canvas id="lfChart"></canvas></div>
    </div>
</div>

<div class="toolbar">
    <div class="toggle-group">
        <button class="toggle-btn active" id="btnLimited" onclick="setFramework('limited')">Limited Reserves</button>
        <button class="toggle-btn" id="btnAmple" onclick="setFramework('ample')">Ample Reserves</button>
    </div>
    
    <div class="controls-container">
        <div class="control-item">
            <div class="control-header">
                <span id="lblOMO">1. Open Market Ops (Reserve Supply)</span>
                <span id="valOMO" style="color:var(--accent-blue);">100</span>
            </div>
            <input type="range" id="inpOMO" min="20" max="180" step="5" value="100">
        </div>
        
        <div class="control-item" id="iorbControl" style="opacity: 0.4;">
            <div class="control-header">
                <span>2. Administered Rate (IORB)</span>
                <span id="valIORB" style="color:var(--accent-green);">4.0%</span>
            </div>
            <input type="range" id="inpIORB" min="1.0" max="8.0" step="0.5" value="4.0" disabled>
        </div>
    </div>
</div>

<footer>© 2026 Dr. Jia's Instructional Suite. Teaching Use Only.</footer>

<script>
    let framework = 'limited'; 
    let resChart, monChart, loanChart;
    
    const PR_BASE = 5.0;  // Base Policy Rate (Baseline for Δ calculation)
    
    const colors = {
        resDem: '#2980b9', resSup: '#e74c3c', resEq: '#2c3e50',
        monDem: '#27ae60', monSup: '#d35400', monEq: '#2c3e50',
        lfDem: '#8e44ad', lfSup: '#f39c12', lfEq: '#2c3e50',
        text: '#34495e'
    };

    function safeDrawText(ctx, text, px, py, area) {
        ctx.textAlign = 'center';
        let textWidth = ctx.measureText(text).width;
        let pad = 6;
        
        if (px + textWidth/2 > area.right) px = area.right - textWidth/2 - pad;
        if (px - textWidth/2 < area.left) px = area.left + textWidth/2 + pad;
        
        py = py - 8;
        if (py < area.top + 16) py = area.top + 18;
        if (py > area.bottom - 5) py = area.bottom - 5;
        
        ctx.fillText(text, px, py);
    }

    const marketLabelsPlugin = {
        id: 'marketLabels',
        afterDraw: (chart) => {
            if (!chart.config.data.labelsConfig) return;
            const ctx = chart.ctx; const area = chart.chartArea;
            const scX = chart.scales.x; const scY = chart.scales.y;
            ctx.save(); 
            // 增大图内文字标签的字号
            ctx.font = 'bold 16px "Segoe UI"';
            
            chart.config.data.labelsConfig.forEach(lbl => {
                ctx.fillStyle = lbl.color;
                let px = scX.getPixelForValue(lbl.x);
                let py = scY.getPixelForValue(lbl.y);
                safeDrawText(ctx, lbl.text, px, py, area);
            });
            ctx.restore();
        }
    };

    Chart.register(marketLabelsPlugin);

    function initCharts() {
        const commonOpts = {
            responsive: true, maintainAspectRatio: false, animation: false,
            plugins: { legend: { display: false } },
            scales: { 
                x: { 
                    display: true, min: 0, max: 200, grid: { color: '#ecf0f1' },
                    ticks: { font: { size: 12 } } // 保持刻度字号不变
                }, 
                y: { 
                    min: 0, max: 10, grid: { color: '#ecf0f1' },
                    ticks: { font: { size: 12 } } // 保持刻度字号不变
                } 
            }
        };

        resChart = new Chart(document.getElementById('reserveChart'), {
            type: 'scatter',
            data: { datasets: [], labelsConfig: [] },
            options: { 
                ...commonOpts, 
                scales: { 
                    // 增大横纵坐标轴标题的字号
                    x: { ...commonOpts.scales.x, title: { display: true, text: 'Quantity of Reserves', font:{weight:'bold', size: 15} } },
                    y: { ...commonOpts.scales.y, title: { display: true, text: 'Policy Rate (iff %)', font:{weight:'bold', size: 15} } } 
                } 
            }
        });

        monChart = new Chart(document.getElementById('moneyChart'), {
            type: 'scatter',
            data: { datasets: [], labelsConfig: [] },
            options: { 
                ...commonOpts, 
                scales: { 
                    x: { ...commonOpts.scales.x, title: { display: true, text: 'Quantity of Money', font:{weight:'bold', size: 15} } },
                    y: { ...commonOpts.scales.y, title: { display: true, text: 'Nominal Rate (i %)', font:{weight:'bold', size: 15} } } 
                } 
            }
        });

        loanChart = new Chart(document.getElementById('lfChart'), {
            type: 'scatter',
            data: { datasets: [], labelsConfig: [] },
            options: { 
                ...commonOpts, 
                scales: { 
                    x: { ...commonOpts.scales.x, title: { display: true, text: 'Quantity of LF', font:{weight:'bold', size: 15} } },
                    y: { ...commonOpts.scales.y, title: { display: true, text: 'Real Rate (r %)', font:{weight:'bold', size: 15} } } 
                } 
            }
        });

        updateModels();
    }

    function setFramework(mode) {
        framework = mode;
        document.getElementById('btnLimited').className = mode === 'limited' ? 'toggle-btn active' : 'toggle-btn';
        document.getElementById('btnAmple').className = mode === 'ample' ? 'toggle-btn active' : 'toggle-btn';
        
        const inpOMO = document.getElementById('inpOMO');
        const inpIORB = document.getElementById('inpIORB');
        const ctrlIORB = document.getElementById('iorbControl');

        if (mode === 'limited') {
            inpOMO.value = 100;
            inpIORB.disabled = true;
            ctrlIORB.style.opacity = '0.4';
            document.getElementById('lblOMO').innerText = '1. Open Market Ops (Reserve Supply)';
        } else {
            inpOMO.value = 150; 
            inpIORB.value = 4.0;
            inpIORB.disabled = false;
            ctrlIORB.style.opacity = '1';
            document.getElementById('lblOMO').innerText = '1. Open Market Ops (Reserve Supply)';
        }
        updateModels();
    }

    function updateModels() {
        const omo = parseFloat(document.getElementById('inpOMO').value);
        const iorb = parseFloat(document.getElementById('inpIORB').value);
        
        document.getElementById('valOMO').innerText = omo;
        document.getElementById('valIORB').innerText = iorb.toFixed(1) + '%';

        let policyRate;
        let resDemandData = [];
        let resSupplyData = [{x: omo, y: 0}, {x: omo, y: 10}];

        if (framework === 'limited') {
            for (let x = 20; x <= 180; x+=10) {
                resDemandData.push({x: x, y: 10 - (x * 0.05)});
            }
            policyRate = 10 - (omo * 0.05); 
            if(policyRate < 0) policyRate = 0;
        } else {
            for (let x = 20; x <= 180; x+=10) {
                let y = Math.max(iorb, 10 - (x * 0.05));
                resDemandData.push({x: x, y: y});
            }
            policyRate = Math.max(iorb, 10 - (omo * 0.05)); 
        }

        let reserveEqLabel = 'Eq';
        if (framework === 'ample') {
            reserveEqLabel = (10 - (omo * 0.05) > iorb) ? 'Eq (Scarcity Zone)' : 'Eq (IORB)';
        }

        resChart.data.datasets = [
            { borderColor: colors.resDem, borderWidth: 3, pointRadius: 0, showLine: true, data: resDemandData },
            { borderColor: colors.resSup, borderWidth: 3, pointRadius: 0, showLine: true, data: resSupplyData },
            { backgroundColor: colors.resEq, pointRadius: 6, data: [{x: omo, y: policyRate}] }
        ];
        resChart.data.labelsConfig = [
            { text: 'Rd', x: 30, y: 8.5, color: colors.resDem },
            // 为了适应更大的字号，偏移量扩大至 +15
            { text: 'Rs', x: omo + 15, y: 9, color: colors.resSup },
            { text: reserveEqLabel, x: omo + 25, y: policyRate, color: colors.resEq }
        ];
        resChart.update();

        let deltaRate = policyRate - PR_BASE;
        
        let msPosition = 100 - (deltaRate * 20); 
        if (msPosition < 10) msPosition = 10; 
        let nominalRate = 11 - (msPosition * 0.05); 
        
        let monDemandData = [];
        for (let x = 20; x <= 180; x+=10) {
            monDemandData.push({x: x, y: 11 - (x * 0.05)});
        }
        
        monChart.data.datasets = [
            { borderColor: colors.monDem, borderWidth: 3, pointRadius: 0, showLine: true, data: monDemandData },
            { borderColor: colors.monSup, borderWidth: 3, pointRadius: 0, showLine: true, data: [{x: msPosition, y: 0}, {x: msPosition, y: 10}] },
            { backgroundColor: colors.monEq, pointRadius: 6, data: [{x: msPosition, y: nominalRate}] }
        ];
        monChart.data.labelsConfig = [
            { text: 'MD', x: 170, y: 2.5, color: colors.monDem },
            // 为了适应更大的字号，偏移量扩大至 +15
            { text: 'MS', x: msPosition + 15, y: 9, color: colors.monSup }
        ];
        monChart.update();

        let lfShiftY = deltaRate; 
        let lfEqQ = 100 - 10 * lfShiftY;
        let realRate = 4 + 0.5 * lfShiftY;

        let lfDemandData = [], lfSupplyData = [];
        for (let x = 20; x <= 180; x+=10) {
            lfDemandData.push({x: x, y: 9 - (x * 0.05)});
            lfSupplyData.push({x: x, y: (x * 0.05) - 1 + lfShiftY});
        }

        loanChart.data.datasets = [
            { borderColor: colors.lfDem, borderWidth: 3, pointRadius: 0, showLine: true, data: lfDemandData },
            { borderColor: colors.lfSup, borderWidth: 3, pointRadius: 0, showLine: true, data: lfSupplyData },
            { backgroundColor: colors.lfEq, pointRadius: 6, data: [{x: lfEqQ, y: realRate}] }
        ];
        loanChart.data.labelsConfig = [
            { text: 'LF-D', x: 160, y: 1, color: colors.lfDem },
            { text: 'LF-S', x: 160, y: 7 + lfShiftY, color: colors.lfSup }
        ];
        loanChart.update();
    }

    document.getElementById('inpOMO').addEventListener('input', updateModels);
    document.getElementById('inpIORB').addEventListener('input', updateModels);

    window.onload = initCharts;
</script>
</body>
</html>
