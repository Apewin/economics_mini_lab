<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Controls</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+Pro:wght@400;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f7f7f5;
            font-family: 'Source Sans Pro', 'Segoe UI', system-ui, sans-serif;
            color: #333;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d4d4d0;
            padding: 28px 32px 20px;
        }

        h2 {
            font-family: 'Merriweather', Georgia, 'Times New Roman', serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a2a3a;
            border-bottom: 2px solid #1a2a3a;
            padding-bottom: 8px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #777;
            margin-bottom: 16px;
            margin-top: 6px;
        }

        #chart-area {
            width: 100%;
            height: 420px;
        }

        /* ---- Controls ---- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 18px 28px;
            align-items: center;
            padding: 14px 0 10px;
            border-top: 1px solid #e0e0e0;
            margin-top: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label.ctrl-label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            white-space: nowrap;
        }

        .radio-group {
            display: flex;
            gap: 10px;
        }

        .radio-group label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .radio-group input[type="radio"] {
            accent-color: #1a5276;
            cursor: pointer;
        }

        input[type="range"] {
            width: 110px;
            height: 4px;
            cursor: pointer;
            accent-color: #1a5276;
        }

        .val-badge {
            font-family: 'Source Sans Pro', monospace;
            font-size: 13px;
            font-weight: 600;
            color: #1a5276;
            min-width: 36px;
            text-align: right;
        }

        .checkboxes {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .checkboxes label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .checkboxes input[type="checkbox"] {
            accent-color: #1a5276;
            cursor: pointer;
            width: 14px;
            height: 14px;
        }

        .swatch {
            display: inline-block;
            width: 10px;
            height: 10px;
        }

        /* ---- Dashboard ---- */
        .dashboard {
            border-top: 1px solid #e0e0e0;
            padding-top: 12px;
            margin-top: 6px;
        }

        .status-bar {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            padding: 7px 0;
            margin-bottom: 10px;
        }

        .status-bar.binding {
            color: #a12525;
            background: #fdf0f0;
            border: 1px solid #e8c0c0;
        }

        .status-bar.non-binding {
            color: #1a6b3a;
            background: #eef8f2;
            border: 1px solid #b8dcc8;
        }

        .dash-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .dash-cell {
            text-align: center;
            padding: 8px 4px;
            border: 1px solid #e8e8e8;
            background: #fafafa;
        }

        .dash-cell .lbl {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .dash-cell .val {
            font-size: 16px;
            font-weight: 700;
            color: #1a2a3a;
            margin-top: 2px;
        }

        .dash-cell.cs-cell .val { color: #1a5276; }
        .dash-cell.ps-cell .val { color: #b85c38; }
        .dash-cell.dwl-cell .val { color: #c03030; }
        .dash-cell.highlight {
            border-color: #b8c8d8;
            background: #eef4fa;
        }
        .dash-cell.highlight .lbl { color: #1a5276; }
        .dash-cell.bm-cell {
            border-color: #aaa;
            background: #f0f0f0;
        }

        .source {
            font-size: 10px;
            color: #888;
            border-top: 1px solid #e0e0e0;
            padding-top: 8px;
            margin-top: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Price Controls: Ceiling &amp; Floor</h2>
    <div class="subtitle">Interactive analysis of binding and non-binding price regulations</div>

    <div id="chart-area"></div>

    <div class="controls">
        <div class="control-group">
            <label class="ctrl-label">Policy:</label>
            <div class="radio-group">
                <label><input type="radio" name="policy" value="ceiling" checked> Ceiling</label>
                <label><input type="radio" name="policy" value="floor"> Floor</label>
            </div>
        </div>
        <div class="control-group">
            <label class="ctrl-label" for="price-slider">Preg:</label>
            <input type="range" id="price-slider" min="10" max="90" value="35">
            <span class="val-badge" id="price-val">$35</span>
        </div>
        <div class="control-group">
            <label class="ctrl-label" for="ped-slider">Demand Ed:</label>
            <input type="range" id="ped-slider" min="0.4" max="2.5" step="0.1" value="1.0">
            <span class="val-badge" id="ped-val">1.0</span>
        </div>
        <div class="control-group">
            <label class="ctrl-label" for="pes-slider">Supply Es:</label>
            <input type="range" id="pes-slider" min="0.4" max="2.5" step="0.1" value="1.0">
            <span class="val-badge" id="pes-val">1.0</span>
        </div>
        <div class="checkboxes">
            <label><input type="checkbox" id="chk-cs" checked> <span class="swatch" style="background:rgba(26,82,118,0.3)"></span> CS</label>
            <label><input type="checkbox" id="chk-ps" checked> <span class="swatch" style="background:rgba(184,92,56,0.3)"></span> PS</label>
            <label><input type="checkbox" id="chk-dwl" checked> <span class="swatch" style="background:rgba(200,60,60,0.4)"></span> DWL</label>
            <label><input type="checkbox" id="chk-gap" checked> <span class="swatch" style="background:#c03030"></span> Shortage / Surplus</label>
        </div>
    </div>

    <div class="dashboard">
        <div class="status-bar" id="status-indicator">Initializing…</div>
        <div class="dash-grid">
            <div class="dash-cell"><div class="lbl">Eq. Price (Pf)</div><div class="val" id="res-pe">—</div></div>
            <div class="dash-cell"><div class="lbl">Eq. Qty (Qf)</div><div class="val" id="res-qe">—</div></div>
            <div class="dash-cell highlight"><div class="lbl">Transacted (Qt)</div><div class="val" id="res-qt">—</div></div>
            <div class="dash-cell"><div class="lbl">Qty Demanded</div><div class="val" id="res-qd">—</div></div>
            <div class="dash-cell"><div class="lbl">Qty Supplied</div><div class="val" id="res-qs">—</div></div>
            <div class="dash-cell bm-cell" id="black-market-box" style="display:none"><div class="lbl">Black Market (Pbm)</div><div class="val" id="res-pbm">—</div></div>
            <div class="dash-cell cs-cell"><div class="lbl">CS</div><div class="val" id="res-cs">—</div></div>
            <div class="dash-cell ps-cell"><div class="lbl">PS</div><div class="val" id="res-ps">—</div></div>
            <div class="dash-cell dwl-cell"><div class="lbl">DWL</div><div class="val" id="res-dwl">—</div></div>
        </div>
    </div>

    <div class="source"><strong>Source:</strong> Standard microeconomic model</div>
</div>

<script>
(function () {
    'use strict';

    /* ── Color palette ── */
    const C = {
        deepBlue:   '#1a5276',
        ochre:      '#b85c38',
        green:      '#2e8b57',
        darkGreen:  '#1a6b3a',
        gray:       '#bbb',
        titleText:  '#1a2a3a',
        gridLine:   '#e8e8e8',
        cs:         'rgba(26,82,118,0.3)',
        ps:         'rgba(184,92,56,0.3)',
        dwl:        'rgba(200,60,60,0.4)',
    };

    /* ── ECharts init ── */
    const myChart = echarts.init(document.getElementById('chart-area'));

    const N = 100;   // data points per curve

    /* ── Demand / Supply generators ── */
    function demandData(b) {
        const pts = [];
        const qMax = 100 / b;
        for (let i = 0; i <= N; i++) {
            const q = (qMax / N) * i;
            pts.push([q, 100 - b * q]);
        }
        return pts;
    }

    function supplyData(d) {
        const pts = [];
        const qMax = 100 / d;
        for (let i = 0; i <= N; i++) {
            const q = (qMax / N) * i;
            pts.push([q, d * q]);
        }
        return pts;
    }

    /* ── Build base option (curves, axes, grid) ── */
    function baseOption(b, d) {
        return {
            animation: false,
            animationDurationUpdate: 0,
            grid: { left: 60, right: 80, top: 40, bottom: 50, containLabel: false },
            xAxis: {
                type: 'value', name: 'Q', nameLocation: 'end', nameGap: 8,
                nameTextStyle: { fontSize: 14, fontWeight: 'bold', color: '#444' },
                min: 0, max: 100,
                axisLine: { lineStyle: { color: '#888' } },
                splitLine: { lineStyle: { color: C.gridLine } },
                axisLabel: { fontSize: 12, color: '#555' },
            },
            yAxis: {
                type: 'value', name: 'P', nameLocation: 'end', nameGap: 8,
                nameTextStyle: { fontSize: 14, fontWeight: 'bold', color: '#444' },
                min: 0, max: 100,
                axisLine: { lineStyle: { color: '#888' } },
                splitLine: { lineStyle: { color: C.gridLine } },
                axisLabel: { fontSize: 12, color: '#555' },
            },
            series: [
                {
                    name: 'D',
                    type: 'line',
                    data: demandData(b),
                    symbol: 'none',
                    lineStyle: { color: C.deepBlue, width: 2.5 },
                    endLabel: { show: true, formatter: '{a}', distance: 8, fontSize: 14, fontWeight: 'bold', color: C.deepBlue },
                    z: 10,
                },
                {
                    name: 'S',
                    type: 'line',
                    data: supplyData(d),
                    symbol: 'none',
                    lineStyle: { color: C.ochre, width: 2.5 },
                    endLabel: { show: true, formatter: '{a}', distance: 8, fontSize: 14, fontWeight: 'bold', color: C.ochre },
                    z: 10,
                },
            ],
        };
    }

    /* ── Helper: data coords → pixel coords ── */
    function toPixel(pts) {
        return pts.map(function (p) {
            return myChart.convertToPixel({ gridIndex: 0 }, p);
        }).filter(function (p) { return p && !isNaN(p[0]) && !isNaN(p[1]); });
    }

    /* ── Render everything ── */
    function render(s) {
        var b = s.b, d = s.d, Preg = s.Preg, Qe = s.Qe, Pe = s.Pe, Qt = s.Qt;
        var isBinding = s.isBinding, policy = s.policy;
        var Pbm = s.Pbm, Qd_reg = s.Qd_reg, Qs_reg = s.Qs_reg;

        /* Step 1: curves */
        var opt = baseOption(b, d);

        /* Equilibrium dashed reference lines (Pf, Qf) via markLine */
        opt.series[0].markLine = {
            silent: true,
            symbol: 'none',
            lineStyle: { color: C.green, type: 'dashed', width: 1.2, opacity: 0.6 },
            label: { show: true, fontSize: 13, fontWeight: 'bold', color: C.green },
            data: [
                { yAxis: Pe, name: 'Pf', label: { formatter: 'Pf', position: 'insideStartTop', offset: [0, -4] } },
                { xAxis: Qe, name: 'Qf', label: { formatter: 'Qf', position: 'insideEndTop', offset: [4, 0] } },
            ],
        };

        /* Equilibrium scatter point */
        opt.series.push({
            name: 'Eq',
            type: 'scatter',
            data: [[Qe, Pe]],
            symbolSize: 12,
            itemStyle: { color: C.darkGreen },
            z: 20,
        });

        /* Preg horizontal dashed line */
        opt.series.push({
            name: 'Preg',
            type: 'line',
            data: [[0, Preg], [100, Preg]],
            symbol: 'none',
            lineStyle: { color: '#999', type: 'dashed', width: 1.8 },
            z: 5,
            endLabel: { show: true, formatter: 'Preg', distance: 8, fontSize: 13, fontWeight: 'bold', color: '#666' },
        });

        /* Qt vertical reference line when binding */
        if (isBinding) {
            opt.series.push({
                name: 'Qt',
                type: 'line',
                data: [[Qt, 0], [Qt, 100]],
                symbol: 'none',
                lineStyle: { color: '#ccc', width: 1.2 },
                z: 4,
                markPoint: {
                    data: [{ coord: [Qt, 0], value: 'Qt', symbol: 'none',
                        label: { show: true, position: 'bottom', fontSize: 13, fontWeight: 'bold', color: '#888' } }]
                },
            });

            /* Black market price line (ceiling only) */
            if (policy === 'ceiling' && Pbm !== null) {
                opt.series.push({
                    name: 'Pbm',
                    type: 'line',
                    data: [[0, Pbm], [Qt, Pbm]],
                    symbol: 'none',
                    lineStyle: { color: '#333', type: 'dashed', width: 1.4 },
                    z: 15,
                    endLabel: { show: true, formatter: 'Pbm', distance: 8, fontSize: 13, fontWeight: 'bold', color: '#333' },
                });
            }
        }

        myChart.setOption(opt, true);

        /* Step 2: polygons via graphic */
        var elems = [];

        /* CS polygon */
        if (document.getElementById('chk-cs').checked) {
            var csPts;
            if (isBinding) {
                csPts = toPixel([[0, Preg], [0, 100], [Qt, 100 - b * Qt], [Qt, Preg]]);
            } else {
                csPts = toPixel([[0, Pe], [0, 100], [Qe, Pe]]);
            }
            if (csPts.length >= 3) {
                elems.push({ type: 'polygon', shape: { points: csPts }, style: { fill: C.cs }, z: 1, silent: true });
            }
        }

        /* PS polygon */
        if (document.getElementById('chk-ps').checked) {
            var psPts;
            if (isBinding) {
                psPts = toPixel([[0, 0], [0, Preg], [Qt, Preg], [Qt, d * Qt]]);
            } else {
                psPts = toPixel([[0, 0], [0, Pe], [Qe, Pe]]);
            }
            if (psPts.length >= 3) {
                elems.push({ type: 'polygon', shape: { points: psPts }, style: { fill: C.ps }, z: 1, silent: true });
            }
        }

        /* DWL polygon */
        if (isBinding && document.getElementById('chk-dwl').checked) {
            var dwlPts = toPixel([[Qt, 100 - b * Qt], [Qe, Pe], [Qt, d * Qt]]);
            if (dwlPts.length >= 3) {
                elems.push({ type: 'polygon', shape: { points: dwlPts }, style: { fill: C.dwl }, z: 1, silent: true });
            }
        }

        /* Shortage / Surplus arrow */
        if (isBinding && document.getElementById('chk-gap').checked) {
            var qMin = Math.min(Qd_reg, Qs_reg);
            var qMax = Math.max(Qd_reg, Qs_reg);
            var isCeiling = policy === 'ceiling';
            var gapColor = isCeiling ? '#c03030' : C.darkGreen;
            var gapLabel = isCeiling ? 'Shortage' : 'Surplus';
            var gapValue = (qMax - qMin).toFixed(1);

            var p1 = myChart.convertToPixel({ gridIndex: 0 }, [qMin, Preg]);
            var p2 = myChart.convertToPixel({ gridIndex: 0 }, [qMax, Preg]);
            if (p1 && p2) {
                /* Arrow line */
                elems.push({
                    type: 'line',
                    shape: { x1: p1[0], y1: p1[1], x2: p2[0], y2: p2[1] },
                    style: { stroke: gapColor, lineWidth: 3 },
                    z: 200,
                    silent: true,
                });
                /* Arrowhead */
                var dx = p2[0] - p1[0];
                var dir = dx > 0 ? 1 : -1;
                elems.push({
                    type: 'polygon',
                    shape: { points: [
                        [p2[0], p2[1]],
                        [p2[0] - dir * 10, p2[1] - 5],
                        [p2[0] - dir * 10, p2[1] + 5],
                    ]},
                    style: { fill: gapColor },
                    z: 200,
                    silent: true,
                });
                /* Label */
                var midX = (p1[0] + p2[0]) / 2;
                var midY = isCeiling ? p1[1] + 18 : p1[1] - 10;
                elems.push({
                    type: 'text',
                    style: {
                        text: gapLabel + ': ' + gapValue,
                        x: midX,
                        y: midY,
                        fill: gapColor,
                        fontSize: 14,
                        fontWeight: 'bold',
                        textAlign: 'center',
                        textVerticalAlign: 'middle',
                    },
                    z: 200,
                    silent: true,
                });
            }
        }

        /* Pbm dot on y-axis when ceiling binding */
        if (isBinding && policy === 'ceiling' && Pbm !== null && document.getElementById('chk-gap').checked) {
            var pbmP = myChart.convertToPixel({ gridIndex: 0 }, [0, Pbm]);
            if (pbmP) {
                elems.push({
                    type: 'circle',
                    shape: { cx: pbmP[0], cy: pbmP[1], r: 4 },
                    style: { fill: '#333' },
                    z: 200,
                    silent: true,
                });
            }
        }

        myChart.setOption({ graphic: { elements: elems } }, { replaceMerge: ['graphic'] });
    }

    /* ── Update dashboard text ── */
    function updateDashboard(s) {
        document.getElementById('price-val').textContent = '$' + s.Preg;
        document.getElementById('ped-val').textContent = s.ed.toFixed(1);
        document.getElementById('pes-val').textContent = s.es.toFixed(1);

        document.getElementById('res-pe').textContent = '$' + s.Pe.toFixed(1);
        document.getElementById('res-qe').textContent = s.Qe.toFixed(1);
        document.getElementById('res-qd').textContent = s.Qd_reg.toFixed(1);
        document.getElementById('res-qs').textContent = s.Qs_reg.toFixed(1);
        document.getElementById('res-qt').textContent = s.Qt.toFixed(1);
        document.getElementById('res-cs').textContent = '$' + Math.max(0, s.finalCS).toFixed(1);
        document.getElementById('res-ps').textContent = '$' + Math.max(0, s.finalPS).toFixed(1);
        document.getElementById('res-dwl').textContent = '$' + s.finalDWL.toFixed(1);

        var statusEl = document.getElementById('status-indicator');
        if (s.isBinding) {
            statusEl.className = 'status-bar binding';
            statusEl.textContent = 'Binding ' + (s.policy === 'ceiling' ? 'Ceiling' : 'Floor');
        } else {
            statusEl.className = 'status-bar non-binding';
            statusEl.textContent = 'Non-binding (Equilibrium)';
        }

        var bmBox = document.getElementById('black-market-box');
        if (s.Pbm !== null) {
            bmBox.style.display = '';
            document.getElementById('res-pbm').textContent = '$' + s.Pbm.toFixed(1);
        } else {
            bmBox.style.display = 'none';
        }
    }

    /* ── Main calculation ── */
    function calc() {
        var policy = document.querySelector('input[name="policy"]:checked').value;
        var Preg = +document.getElementById('price-slider').value;
        var ed = +document.getElementById('ped-slider').value;
        var es = +document.getElementById('pes-slider').value;
        var b = 1 / ed;
        var d = 1 / es;

        var Qe = 100 / (b + d);
        var Pe = d * Qe;
        var Qd_reg = (100 - Preg) / b;
        var Qs_reg = Preg / d;
        var isBinding = (policy === 'ceiling' && Preg < Pe) || (policy === 'floor' && Preg > Pe);
        var Pbm = null;
        var Qt, finalCS, finalPS, finalDWL;

        if (isBinding) {
            Qt = Math.min(Qd_reg, Qs_reg);
            finalCS = (100 - Preg) * Qt - 0.5 * b * Qt * Qt;
            finalPS = Preg * Qt - 0.5 * d * Qt * Qt;
            var Pd_at_Qt = 100 - b * Qt;
            var Ps_at_Qt = d * Qt;
            finalDWL = 0.5 * (Pd_at_Qt - Ps_at_Qt) * (Qe - Qt);
            if (policy === 'ceiling') Pbm = Pd_at_Qt;
        } else {
            Qt = Qe;
            finalCS = 0.5 * (100 - Pe) * Qe;
            finalPS = 0.5 * Pe * Qe;
            finalDWL = 0;
        }

        var s = {
            policy: policy, Preg: Preg, ed: ed, es: es,
            b: b, d: d, Qe: Qe, Pe: Pe,
            Qd_reg: Qd_reg, Qs_reg: Qs_reg,
            isBinding: isBinding, Qt: Qt, Pbm: Pbm,
            finalCS: finalCS, finalPS: finalPS, finalDWL: finalDWL,
        };

        updateDashboard(s);
        render(s);
    }

    /* ── Event wiring ── */
    document.querySelectorAll('input').forEach(function (el) {
        el.addEventListener('input', calc);
        el.addEventListener('change', calc);
    });

    window.addEventListener('resize', function () { myChart.resize(); calc(); });

    /* ── Initial render ── */
    calc();

})();
</script>
</body>
</html>
