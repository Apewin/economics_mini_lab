<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Market Economic Simulator Pro</title>
    <script src="database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f7f7f5;
            font-family: 'Source Sans Pro', sans-serif;
            color: #333;
            padding: 24px 16px;
        }
        .container {
            max-width: 880px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d4d4d0;
            padding: 28px 32px;
        }
        h2 {
            font-family: 'Merriweather', serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a2a3a;
            border-bottom: 2px solid #1a2a3a;
            padding-bottom: 8px;
        }
        .subtitle {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 14px;
            color: #666;
            margin-top: 6px;
            margin-bottom: 20px;
        }
        .screen { display: none; }
        .screen.active { display: block; }

        /* Start Screen */
        .topic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 20px;
            margin: 16px 0;
        }
        .topic-grid label {
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
        }
        .topic-grid input[type="checkbox"] { transform: scale(1.1); accent-color: #1a5276; }
        .form-row {
            margin: 14px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .form-row label {
            font-size: 14px;
            font-weight: 600;
            color: #1a2a3a;
            min-width: 120px;
        }
        .form-row select,
        .form-row input[type="text"] {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 14px;
            padding: 8px 12px;
            border: 1px solid #d4d4d0;
            background: #fff;
            color: #333;
            outline: none;
            flex: 1;
        }
        .form-row select:focus,
        .form-row input[type="text"]:focus {
            border-color: #1a5276;
        }
        .start-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 15px;
            font-weight: 600;
            background: #1a5276;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .start-btn:hover { background: #1a3a5c; }

        /* Quiz Screen */
        .quiz-header {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #1a2a3a;
            background: #f7f7f5;
            border: 1px solid #d4d4d0;
            padding: 8px 14px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .question-text {
            font-size: 15px;
            line-height: 1.7;
            color: #1a2a3a;
            padding: 16px 0;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 16px;
        }
        #echarts-chart {
            width: 100%;
            height: 400px;
            border: 1px solid #e8e8e8;
            margin-bottom: 16px;
        }
        .choice-section { margin-bottom: 16px; }
        .choice-section .section-label {
            font-family: 'Merriweather', serif;
            font-size: 14px;
            font-weight: 700;
            color: #1a2a3a;
            margin: 12px 0 8px;
        }
        .choice-group {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
        }
        .choice-btn {
            flex: 1;
            padding: 10px 8px;
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 14px;
            font-weight: 600;
            background: #fff;
            border: 1px solid #d4d4d0;
            color: #333;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .choice-btn:hover:not(:disabled) { background: #f0f0ec; }
        .choice-btn.selected {
            background: #1a5276;
            color: #fff;
            border-color: #1a5276;
        }
        .choice-btn:disabled { opacity: 0.6; cursor: default; }
        .action-bar {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }
        .action-bar button {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 20px;
            border: 1px solid #d4d4d0;
            background: #f7f7f5;
            color: #333;
            cursor: pointer;
        }
        .action-bar button:hover { background: #eaeae6; }
        #submitBtn {
            background: #1a5276 !important;
            color: #fff !important;
            border-color: #1a5276 !important;
            flex: 1;
        }
        #submitBtn:hover { background: #1a3a5c !important; }
        #nextBtn {
            background: #2e8b57 !important;
            color: #fff !important;
            border-color: #2e8b57 !important;
            flex: 1;
        }
        #nextBtn:hover { background: #24704a !important; }
        #feedbackArea {
            display: none;
            padding: 16px;
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.7;
            border: 1px solid #d4d4d0;
        }
        #feedbackArea.correct {
            background: #f0faf4;
            border-color: #2e8b57;
            color: #1a5c3a;
        }
        #feedbackArea.incorrect {
            background: #fdf5f5;
            border-color: #b85c38;
            color: #7a2e1e;
        }
        .reveal-btn {
            margin-top: 10px;
            padding: 8px 16px;
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 13px;
            font-weight: 600;
            background: #888;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .reveal-btn:hover { background: #666; }
        .explanation-box {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e8e8e8;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }

        /* End Screen */
        .final-score {
            text-align: center;
            margin: 20px 0;
        }
        .final-score .score-text {
            font-family: 'Merriweather', serif;
            font-size: 18px;
            font-weight: 700;
            color: #1a2a3a;
        }
        .leaderboard { margin-top: 24px; }
        .leaderboard h3 {
            font-family: 'Merriweather', serif;
            font-size: 15px;
            font-weight: 700;
            color: #1a2a3a;
            border-bottom: 2px solid #1a2a3a;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px solid #e8e8e8;
        }
        .leaderboard-item:last-child { border-bottom: none; }
        .new-config-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 15px;
            font-weight: 600;
            background: #1a5276;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .new-config-btn:hover { background: #1a3a5c; }
        .source {
            margin-top: 24px;
            padding-top: 12px;
            border-top: 1px solid #e8e8e8;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Screen 1: Start -->
    <div id="startScreen" class="screen active">
        <h2>Economic Demand & Supply Principles</h2>
        <div class="subtitle">Multi-Market Interactive Challenge</div>

        <div class="topic-grid">
            <label><input type="checkbox" class="topic-cb" value="Product Market" checked> Product Market</label>
            <label><input type="checkbox" class="topic-cb" value="Labour Market" checked> Labour Market</label>
            <label><input type="checkbox" class="topic-cb" value="Money Market" checked> Money Market</label>
            <label><input type="checkbox" class="topic-cb" value="Foreign Exchange Market" checked> Foreign Exchange Market</label>
            <label><input type="checkbox" class="topic-cb" value="Loanable Funds Market" checked> Loanable Funds Market</label>
        </div>

        <div class="form-row">
            <label for="qCountSelect">Questions:</label>
            <select id="qCountSelect">
                <option value="5">5 Questions</option>
                <option value="10" selected>10 Questions</option>
                <option value="20">20 Questions</option>
            </select>
        </div>

        <div class="form-row">
            <label for="playerName">Player Name:</label>
            <input type="text" id="playerName" placeholder="Enter student / team name" maxlength="15">
        </div>

        <button class="start-btn" onclick="startQuiz()">Generate Custom Practice</button>
    </div>

    <!-- Screen 2: Quiz -->
    <div id="quizScreen" class="screen">
        <h2 id="marketTypeHeader">Market Analysis</h2>
        <div class="quiz-header">
            <span id="playerDisplay"></span>
            <span>Q: <span id="qCounter"></span>/<span id="qTotal"></span></span>
            <span>Score: <span id="scoreDisplay">0</span></span>
        </div>

        <div id="qText" class="question-text">Loading...</div>

        <div id="echarts-chart"></div>

        <div class="choice-section">
            <div class="section-label" id="pLabel">1. Predict the change in Equilibrium Price (P):</div>
            <div class="choice-group" id="priceGroup">
                <button class="choice-btn" data-type="p" data-val="increase" id="pIncBtn">Increase</button>
                <button class="choice-btn" data-type="p" data-val="decrease" id="pDecBtn">Decrease</button>
                <button class="choice-btn" data-type="p" data-val="uncertain">Uncertain</button>
            </div>
            <div class="section-label" id="qLabel">2. Predict the change in Equilibrium Quantity (Q):</div>
            <div class="choice-group" id="qtyGroup">
                <button class="choice-btn" data-type="q" data-val="increase">Increase</button>
                <button class="choice-btn" data-type="q" data-val="decrease">Decrease</button>
                <button class="choice-btn" data-type="q" data-val="uncertain">Uncertain</button>
            </div>
        </div>

        <div class="action-bar">
            <button onclick="resetGraph()">Reset Graph</button>
            <button id="submitBtn" onclick="checkAnswer()">Submit Answer</button>
            <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question</button>
        </div>

        <div id="feedbackArea"></div>
    </div>

    <!-- Screen 3: End -->
    <div id="endScreen" class="screen">
        <h2>Session Complete!</h2>
        <div class="final-score">
            <div class="score-text" id="finalScoreText"></div>
        </div>
        <div class="leaderboard">
            <h3>Top Scores</h3>
            <div id="leaderboardList"></div>
        </div>
        <button class="new-config-btn" onclick="location.reload()">New Configuration</button>
    </div>

    <div class="source"><strong>Source:</strong> Multi-market S&amp;D analysis framework</div>
</div>

<script>
    /* ===== Color Palette ===== */
    const C = {
        deepBlue: '#1a5276',   // Demand curve (D0, D1)
        ochre: '#b85c38',      // Supply curve (S0, S1)
        green: '#2e8b57',      // New equilibrium point, correct answer
        gray: '#bbb',          // Original curves (D0, S0) when shifted
        titleText: '#1a2a3a',
        gridLine: '#e8e8e8',
    };

    /* ===== State ===== */
    let sessionQuestions = [];
    let currentQ = 0;
    let score = 0;
    let totalQuestions = 0;
    let playerName = "";

    let dShift = 0;  // pixel offset for D1 handle
    let sShift = 0;  // pixel offset for S1 handle
    let selectedP = null;
    let selectedQ = null;
    const SHIFT_THRESHOLD = 25;

    let chart = null;

    const screens = {
        start: document.getElementById('startScreen'),
        quiz: document.getElementById('quizScreen'),
        end: document.getElementById('endScreen')
    };

    function switchScreen(screenKey) {
        Object.keys(screens).forEach(key => {
            if (screens[key]) screens[key].classList.remove('active');
        });
        if (screens[screenKey]) screens[screenKey].classList.add('active');
    }

    /* ===== Market Label Adaptation ===== */
    function adaptMarketLabels(marketType) {
        const header = document.getElementById('marketTypeHeader');
        if (header) header.innerText = marketType;

        const labels = {
            "Labour Market": { y: "Wage (W)", x: "Employment (L)", p0: "W₀", q0: "L₀", p1: "W₁", q1: "L₁", d0: "D_Lab", s0: "S_Lab", d1: "D₁", s1: "S₁" },
            "Money Market": { y: "Interest Rate (r)", x: "Qty of Money (M)", p0: "r₀", q0: "M₀", p1: "r₁", q1: "M₁", d0: "MD₀", s0: "MS₀", d1: "MD₁", s1: "MS₁" },
            "Foreign Exchange Market": { y: "Exchange Rate (ER)", x: "Qty of Forex (Q)", p0: "ER₀", q0: "Q₀", p1: "ER₁", q1: "Q₁", d0: "D₀", s0: "S₀", d1: "D₁", s1: "S₁" },
            "Loanable Funds Market": { y: "Real Interest (r)", x: "Loanable Funds (Q)", p0: "r₀", q0: "Q₀", p1: "r₁", q1: "Q₁", d0: "D_LF", s0: "S_LF", d1: "D₁", s1: "S₁" },
            "Product Market": { y: "Price (P)", x: "Quantity (Q)", p0: "P₀", q0: "Q₀", p1: "P₁", q1: "Q₁", d0: "D₀", s0: "S₀", d1: "D₁", s1: "S₁" }
        };

        const config = labels[marketType] || labels["Product Market"];

        const pLabel = document.getElementById('pLabel');
        const qLabel = document.getElementById('qLabel');
        const pIncBtn = document.getElementById('pIncBtn');
        const pDecBtn = document.getElementById('pDecBtn');

        if (pLabel) pLabel.innerText = `1. Predict the change in Equilibrium ${config.y.split(' ')[0]}:`;
        if (qLabel) qLabel.innerText = `2. Predict the change in Equilibrium ${config.x.split(' ')[0]}:`;
        if (pIncBtn) pIncBtn.innerText = marketType === "Foreign Exchange Market" ? "Appreciate" : "Increase";
        if (pDecBtn) pDecBtn.innerText = marketType === "Foreign Exchange Market" ? "Depreciate" : "Decrease";

        // Update ECharts axis labels and curve labels
        if (chart) {
            chart._marketConfig = config;
            updateChartLabels(config);
        }
    }

    function updateChartLabels(config) {
        if (!chart) return;

        // Update axis names and series names via setOption
        chart.setOption({
            yAxis: [{ name: config.y }],
            xAxis: [{ name: config.x }],
            series: [
                { name: config.d0 }, // D0
                { name: config.s0 }, // S0
                { name: config.d1 }, // D1
                { name: config.s1 }  // S1
            ],
            graphic: [{ id: 'label-d0', style: { text: config.d0 } },
                      { id: 'label-s0', style: { text: config.s0 } },
                      { id: 'label-p0', style: { text: config.p0 } },
                      { id: 'label-q0', style: { text: config.q0 } },
                      { id: 'label-p1', style: { text: config.p1 } },
                      { id: 'label-q1', style: { text: config.q1 } }]
        });

        // Update handle labels (nested in groups) via setOption children merge
        chart.setOption({
            graphic: [
                { id: 'handleDGroup', children: [{}, { style: { text: config.d1 } }] },
                { id: 'handleSGroup', children: [{}, { style: { text: config.s1 } }] }
            ]
        });
    }

    /* ===== ECharts Setup ===== */
    function initChart() {
        chart = echarts.init(document.getElementById('echarts-chart'));

        // Original D0: P = 10 - Q  -> points (1,9) to (9,1)
        // Original S0: P = Q       -> points (1,1) to (9,9)
        // Equilibrium at (5,5)

        const option = {
            animation: false,
            grid: { left: 60, right: 40, top: 40, bottom: 50 },
            xAxis: {
                type: 'value', min: 0, max: 10, show: false,
                name: 'Quantity (Q)',
                nameLocation: 'end', nameGap: 10,
                nameTextStyle: { fontSize: 14, fontWeight: 'bold', color: '#333' }
            },
            yAxis: {
                type: 'value', min: 0, max: 10, show: false,
                name: 'Price (P)',
                nameLocation: 'end', nameGap: 10,
                nameTextStyle: { fontSize: 14, fontWeight: 'bold', color: '#333' }
            },
            series: [
                // 0: D0 (original demand, dashed gray)
                {
                    type: 'line', name: 'D₀', data: [[1, 9], [9, 1]],
                    lineStyle: { color: C.gray, type: 'dashed', width: 2 },
                    symbol: 'none', silent: true, z: 1
                },
                // 1: S0 (original supply, dashed gray)
                {
                    type: 'line', name: 'S₀', data: [[1, 1], [9, 9]],
                    lineStyle: { color: C.gray, type: 'dashed', width: 2 },
                    symbol: 'none', silent: true, z: 1
                },
                // 2: D1 (draggable demand, solid deepBlue)
                {
                    type: 'line', name: 'D₁', id: 'lineD1', data: [[1, 9], [9, 1]],
                    lineStyle: { color: C.deepBlue, width: 3 },
                    symbol: 'none', silent: true, z: 3
                },
                // 3: S1 (draggable supply, solid ochre)
                {
                    type: 'line', name: 'S₁', id: 'lineS1', data: [[1, 1], [9, 9]],
                    lineStyle: { color: C.ochre, width: 3 },
                    symbol: 'none', silent: true, z: 3
                },
                // 4: E0 equilibrium point (original)
                {
                    type: 'scatter', name: 'E₀', data: [[5, 5]], symbolSize: 10,
                    itemStyle: { color: C.gray }, silent: true, z: 2
                },
                // 5: E1 new equilibrium (hidden initially)
                {
                    type: 'scatter', name: 'E₁', id: 'eqPoint', data: [], symbolSize: 14,
                    itemStyle: { color: C.green }, silent: true, z: 5
                },
                // 6: New eq dashed lines (hidden initially)
                {
                    type: 'line', id: 'eqLines', data: [],
                    lineStyle: { color: C.green, type: 'dashed', width: 2 },
                    symbol: 'none', silent: true, z: 2
                }
            ],
            graphic: [{
                type: 'group',
                id: 'handles',
                children: [
                    // 0: D0 label (positioned by positionLabels())
                    {
                        type: 'text', id: 'label-d0', position: [0, 0],
                        style: { text: 'D₀', fill: C.gray, font: 'bold 14px Source Sans Pro' },
                        z: 10
                    },
                    // 1: S0 label (positioned by positionLabels())
                    {
                        type: 'text', id: 'label-s0', position: [0, 0],
                        style: { text: 'S₀', fill: C.gray, font: 'bold 14px Source Sans Pro' },
                        z: 10
                    },
                    // 2: D0 label positioned at end of D0 curve
                    {
                        type: 'text',
                        position: [0, 0],
                        style: { text: 'D₀', fill: C.gray, font: 'bold 13px Source Sans Pro' },
                        z: 10, silent: true
                    },
                    // 3: S0 label positioned at end of S0 curve
                    {
                        type: 'text',
                        position: [0, 0],
                        style: { text: 'S₀', fill: C.gray, font: 'bold 13px Source Sans Pro' },
                        z: 10, silent: true
                    },
                    // 4: D1 handle group
                    {
                        type: 'group',
                        id: 'handleDGroup',
                        x: 0, y: 0,
                        draggable: true,
                        z: 20,
                        ondrag: function () {
                            dShift = this.position ? this.position[0] : 0;
                            updateCurvesFromShift();
                        },
                        children: [
                            {
                                type: 'circle',
                                position: [0, 0],
                                shape: { r: 14 },
                                style: { fill: C.deepBlue, stroke: '#fff', lineWidth: 2 },
                                cursor: 'ew-resize'
                            },
                            {
                                type: 'text',
                                position: [0, 0],
                                style: { text: 'D₁', fill: '#fff', font: 'bold 11px Source Sans Pro', textAlign: 'center', textVerticalAlign: 'middle' },
                                cursor: 'ew-resize'
                            }
                        ]
                    },
                    // 5: S1 handle group
                    {
                        type: 'group',
                        id: 'handleSGroup',
                        x: 0, y: 0,
                        draggable: true,
                        z: 20,
                        ondrag: function () {
                            sShift = this.position ? this.position[0] : 0;
                            updateCurvesFromShift();
                        },
                        children: [
                            {
                                type: 'circle',
                                position: [0, 0],
                                shape: { r: 14 },
                                style: { fill: C.ochre, stroke: '#fff', lineWidth: 2 },
                                cursor: 'ew-resize'
                            },
                            {
                                type: 'text',
                                position: [0, 0],
                                style: { text: 'S₁', fill: '#fff', font: 'bold 11px Source Sans Pro', textAlign: 'center', textVerticalAlign: 'middle' },
                                cursor: 'ew-resize'
                            }
                        ]
                    },
                    // 6: P0 label
                    {
                        type: 'text',
                        id: 'label-p0',
                        position: [0, 0],
                        style: { text: 'P₀', fill: C.gray, font: 'bold 13px Source Sans Pro' },
                        z: 10, silent: true
                    },
                    // 7: Q0 label
                    {
                        type: 'text',
                        id: 'label-q0',
                        position: [0, 0],
                        style: { text: 'Q₀', fill: C.gray, font: 'bold 13px Source Sans Pro' },
                        z: 10, silent: true
                    },
                    // 8: P1 label (hidden initially)
                    {
                        type: 'text',
                        id: 'label-p1',
                        position: [0, 0],
                        style: { text: 'P₁', fill: C.green, font: 'bold 13px Source Sans Pro' },
                        z: 10, silent: true, invisible: true
                    },
                    // 9: Q1 label (hidden initially)
                    {
                        type: 'text',
                        id: 'label-q1',
                        position: [0, 0],
                        style: { text: 'Q₁', fill: C.green, font: 'bold 13px Source Sans Pro' },
                        z: 10, silent: true, invisible: true
                    }
                ]
            }]
        };

        chart.setOption(option);
        chart._marketConfig = null;

        // Position handles and labels after chart renders
        requestAnimationFrame(() => {
            positionHandles();
            positionLabels();
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            chart.resize();
            requestAnimationFrame(() => {
                positionHandles();
                positionLabels();
            });
        });
    }

    /* Convert data coords to pixel coords */
    function dataToPixel(q, p) {
        if (!chart) return [0, 0];
        return chart.convertToPixel({ gridIndex: 0 }, [q, p]);
    }

    /* Convert pixel to data coords */
    function pixelToData(px, py) {
        if (!chart) return [0, 0];
        return chart.convertFromPixel({ gridIndex: 0 }, [px, py]);
    }

    /* Position handles at initial curve midpoint */
    function positionHandles() {
        if (!chart) return;
        const center = dataToPixel(5, 5);
        chart.setOption({
            graphic: [
                { id: 'handleDGroup', x: 0, y: 0, children: [{ position: center }, { position: center }] },
                { id: 'handleSGroup', x: 0, y: 0, children: [{ position: center }, { position: center }] }
            ]
        });
    }

    /* Position text labels for D0, S0, P0, Q0 */
    function positionLabels() {
        if (!chart) return;

        // D0 label at end of D0 curve: data (9, 1)
        const d0End = dataToPixel(9, 1);
        // S0 label at end of S0 curve: data (9, 9)
        const s0End = dataToPixel(9, 9);
        // P0 label: y-axis at equilibrium, data (0, 5)
        const p0Pos = dataToPixel(0, 5);
        // Q0 label: x-axis at equilibrium, data (5, 0)
        const q0Pos = dataToPixel(5, 0);

        chart.setOption({
            graphic: [
                { id: 'label-d0', position: [d0End[0] + 8, d0End[1] - 5] },
                { id: 'label-s0', position: [s0End[0] + 8, s0End[1] - 5] },
                { id: 'label-p0', position: [p0Pos[0] - 30, p0Pos[1] - 7] },
                { id: 'label-q0', position: [q0Pos[0] - 7, q0Pos[1] + 10] }
            ]
        });
    }

    /* ===== Update curves based on handle position ===== */
    function updateCurvesFromShift() {
        if (!chart) return;

        // dShift and sShift are pixel offsets from initial handle position
        // Convert pixel shift to data-space shift
        const origin = dataToPixel(0, 0);
        const unitPoint = dataToPixel(1, 0);
        const pixelsPerUnit = unitPoint[0] - origin[0];

        const dShiftData = dShift / pixelsPerUnit;
        const sShiftData = sShift / pixelsPerUnit;

        // D1: P = 10 - (Q - dShiftData) = (10 + dShiftData) - Q
        // Two endpoints in data space: (1 + dShiftData, 9) and (9 + dShiftData, 1)
        const d1Data = [[1 + dShiftData, 9], [9 + dShiftData, 1]];

        // S1: P = (Q - sShiftData) = Q - sShiftData
        // Two endpoints: (1 + sShiftData, 1) and (9 + sShiftData, 9)
        const s1Data = [[1 + sShiftData, 1], [9 + sShiftData, 9]];

        // Calculate new equilibrium at intersection of D1 and S1
        // D1: P = (10 + dShiftData) - Q
        // S1: P = Q - sShiftData
        // (10 + dShiftData) - Q = Q - sShiftData
        // 10 + dShiftData + sShiftData = 2Q
        // Q_eq = (10 + dShiftData + sShiftData) / 2
        const qEq = (10 + dShiftData + sShiftData) / 2;
        const pEq = qEq - sShiftData; // = (10 + dShiftData - sShiftData) / 2

        // Show new equilibrium if curves have shifted
        const showEq = Math.abs(dShift) > 5 || Math.abs(sShift) > 5;

        const eqPointData = showEq ? [[qEq, pEq]] : [];
        const eqLineData = showEq ? [[0, pEq], [qEq, pEq], [qEq, 0]] : [];

        // Update P1 and Q1 labels
        if (showEq) {
            const eqPixel = dataToPixel(qEq, pEq);
            chart.setOption({
                graphic: [
                    { id: 'label-p1', invisible: false, position: [eqPixel[0] - 35, eqPixel[1] - 7] },
                    { id: 'label-q1', invisible: false, position: [eqPixel[0] - 7, eqPixel[1] + 14] }
                ]
            });
        } else {
            chart.setOption({
                graphic: [
                    { id: 'label-p1', invisible: true },
                    { id: 'label-q1', invisible: true }
                ]
            });
        }

        chart.setOption({
            series: [
                { /* D0 */ },
                { /* S0 */ },
                { id: 'lineD1', data: d1Data },
                { id: 'lineS1', data: s1Data },
                { /* E0 */ },
                { id: 'eqPoint', data: eqPointData },
                { id: 'eqLines', data: eqLineData }
            ]
        });
    }

    /* ===== Reset Graph ===== */
    function resetGraph() {
        dShift = 0;
        sShift = 0;
        selectedP = null;
        selectedQ = null;

        document.querySelectorAll('.choice-btn').forEach(b => {
            b.classList.remove('selected');
            b.disabled = false;
        });

        if (!chart) return;

        // Reset handles, labels, and curves using direct setOption
        const center = dataToPixel(5, 5);
        chart.setOption({
            graphic: [
                { id: 'handleDGroup', x: 0, y: 0, children: [{ position: center }, { position: center }] },
                { id: 'handleSGroup', x: 0, y: 0, children: [{ position: center }, { position: center }] },
                { id: 'label-p1', invisible: true },
                { id: 'label-q1', invisible: true }
            ],
            series: [
                {}, {},
                { id: 'lineD1', data: [[1, 9], [9, 1]] },
                { id: 'lineS1', data: [[1, 1], [9, 9]] },
                {},
                { id: 'eqPoint', data: [] },
                { id: 'eqLines', data: [] }
            ]
        });
    }

    /* ===== Quiz Logic ===== */
    function startQuiz() {
        const nameInput = document.getElementById('playerName');
        if (!nameInput) return;

        let input = nameInput.value.trim();
        if (!input) { alert("Please enter your team or student name!"); return; }

        const selectedTopics = Array.from(document.querySelectorAll('.topic-cb:checked')).map(cb => cb.value);
        if (selectedTopics.length === 0) {
            alert("Please select at least one Market Topic to practice!");
            return;
        }

        if (typeof econDatabase === 'undefined') {
            alert("Error: database.js not loaded properly.");
            return;
        }
        let filteredDB = econDatabase.filter(q => selectedTopics.includes(q.type));

        if (filteredDB.length === 0) {
            alert("No questions found in the database for the selected topics.");
            return;
        }

        const desiredCount = parseInt(document.getElementById('qCountSelect').value);
        let shuffled = [...filteredDB].sort(() => Math.random() - 0.5);

        totalQuestions = Math.min(desiredCount, shuffled.length);
        sessionQuestions = shuffled.slice(0, totalQuestions);

        playerName = input;
        currentQ = 0;
        score = 0;

        switchScreen('quiz');

        const pDisplay = document.getElementById('playerDisplay');
        if (pDisplay) pDisplay.innerText = playerName;

        const qTotalSpan = document.getElementById('qTotal');
        if (qTotalSpan) qTotalSpan.innerText = totalQuestions;

        if (!chart) initChart();

        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= totalQuestions) {
            endQuiz();
            return;
        }

        let qData = sessionQuestions[currentQ];
        adaptMarketLabels(qData.type);

        const qCounter = document.getElementById('qCounter');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const qText = document.getElementById('qText');

        if (qCounter) qCounter.innerText = currentQ + 1;
        if (scoreDisplay) scoreDisplay.innerText = score;
        if (qText) qText.innerText = qData.text;

        resetGraph();

        const fb = document.getElementById('feedbackArea');
        if (fb) { fb.style.display = 'none'; fb.innerHTML = ''; }

        const sBtn = document.getElementById('submitBtn');
        const nBtn = document.getElementById('nextBtn');
        if (sBtn) sBtn.style.display = 'block';
        if (nBtn) nBtn.style.display = 'none';

        // Enable handle dragging
        setHandlesDraggable(true);
    }

    function setHandlesDraggable(enabled) {
        if (!chart) return;
        chart.setOption({
            graphic: [
                { id: 'handleDGroup', draggable: enabled },
                { id: 'handleSGroup', draggable: enabled }
            ]
        });
    }

    // Choice button handlers
    document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            let type = this.getAttribute('data-type');
            let val = this.getAttribute('data-val');
            document.querySelectorAll(`.choice-btn[data-type="${type}"]`).forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            if (type === 'p') selectedP = val;
            if (type === 'q') selectedQ = val;
        });
    });

    function checkAnswer() {
        if (!selectedP || !selectedQ) { alert("Please complete both parameters before submitting."); return; }

        let qData = sessionQuestions[currentQ];

        // Convert pixel shift to data-space shift to determine direction
        const origin = dataToPixel(0, 0);
        const unitPoint = dataToPixel(1, 0);
        const pixelsPerUnit = unitPoint[0] - origin[0];

        let userD = "none", userS = "none";
        if (dShift > SHIFT_THRESHOLD) userD = "right";
        else if (dShift < -SHIFT_THRESHOLD) userD = "left";
        if (sShift > SHIFT_THRESHOLD) userS = "right";
        else if (sShift < -SHIFT_THRESHOLD) userS = "left";

        let isCorrect = (userD === qData.d) && (userS === qData.s) && (selectedP === qData.p) && (selectedQ === qData.q);

        document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
        setHandlesDraggable(false);

        const sBtn = document.getElementById('submitBtn');
        const nBtn = document.getElementById('nextBtn');
        if (sBtn) sBtn.style.display = 'none';
        if (nBtn) nBtn.style.display = 'block';

        // Show the new equilibrium point and dashed lines after submit
        updateCurvesFromShift();

        let fb = document.getElementById('feedbackArea');
        if (fb) {
            fb.style.display = 'block';
            if (isCorrect) {
                score++;
                fb.className = "correct";
                fb.innerHTML = `<strong style="font-size: 16px;">Correct! Excellent Analysis.</strong><br><div style="margin-top:8px; color:#1a2a3a;">${qData.exp}</div>`;
            } else {
                fb.className = "incorrect";
                fb.innerHTML = `
                    <strong style="font-size: 16px;">Incorrect.</strong>
                    <ul style="margin:8px 0; padding-left: 20px; color: #7a2e1e; font-size: 14px;">
                        <li>Your Demand shift: <strong>${userD.toUpperCase()}</strong></li>
                        <li>Your Supply shift: <strong>${userS.toUpperCase()}</strong></li>
                        <li>Your Price/Rate selection: <strong>${selectedP.toUpperCase()}</strong></li>
                        <li>Your Quantity selection: <strong>${selectedQ.toUpperCase()}</strong></li>
                    </ul>
                    <button class="reveal-btn" onclick="document.getElementById('expBox').style.display='block'; this.style.display='none';">View Explanation</button>
                    <div id="expBox" class="explanation-box">
                        <strong style="color:#2e8b57; font-size: 15px;">Standard Model Solution:</strong><br>
                        <div style="line-height: 1.5; margin-top: 5px;">
                            &bull; Demand Curve Shift: <strong>${qData.d.toUpperCase()}</strong><br>
                            &bull; Supply Curve Shift: <strong>${qData.s.toUpperCase()}</strong><br>
                            &bull; Equilibrium Price/Rate: <strong>${qData.p.toUpperCase()}</strong><br>
                            &bull; Equilibrium Volume/Qty: <strong>${qData.q.toUpperCase()}</strong>
                        </div>
                        <br>
                        <strong>Economic Logic:</strong><br>
                        <span style="color: #333;">${qData.exp}</span>
                    </div>
                `;
            }
        }
        const sDisplay = document.getElementById('scoreDisplay');
        if (sDisplay) sDisplay.innerText = score;
    }

    function nextQuestion() { currentQ++; loadQuestion(); }

    function endQuiz() {
        switchScreen('end');
        const fText = document.getElementById('finalScoreText');
        if (fText) fText.innerText = `${playerName}, you scored ${score} / ${totalQuestions}`;

        let lb = [];
        try { lb = JSON.parse(localStorage.getItem('econSessionLeaderboard')) || []; } catch (e) { lb = []; }

        lb.push({ name: playerName, score: score, max: totalQuestions, date: new Date().toLocaleDateString() });
        lb.sort((a, b) => (b.score / b.max) - (a.score / a.max));
        lb = lb.slice(0, 5);

        try { localStorage.setItem('econSessionLeaderboard', JSON.stringify(lb)); } catch (e) { }

        let lbHtml = "";
        lb.forEach((entry, idx) => {
            let medal = idx === 0 ? "1st" : (idx === 1 ? "2nd" : (idx === 2 ? "3rd" : (idx + 1) + "th"));
            lbHtml += `
                <div class="leaderboard-item">
                    <span>${medal} - <strong>${entry.name}</strong></span>
                    <span>${entry.score} / ${entry.max} pts <small style="color:#888; margin-left:5px;">(${entry.date})</small></span>
                </div>
            `;
        });
        const lbList = document.getElementById('leaderboardList');
        if (lbList) lbList.innerHTML = lbHtml;
    }

    /* ===== Init ===== */
    window.addEventListener('DOMContentLoaded', () => {
        // Chart will be initialized when quiz starts
    });
</script>
