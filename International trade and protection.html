<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Trade and Protection</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --cs: #4a7a9a;
            --ps: #a0616a;
            --rev: #5a8a6a;
            --dwl: #a08a50;
            --deepBlue: #1a5276;
            --ochre: #b85c38;
            --green: #3d6b4f;
            --gray: #bbb;
            --text: #1a2a3a;
        }
        body { background: #f7f7f5; font-family: 'Source Sans Pro', sans-serif; color: var(--text); margin: 0; padding: 24px 16px; }
        .container { max-width: 880px; margin: 0 auto; background: #fff; border: 1px solid #d4d4d0; padding: 28px 32px; }
        h2 { font-family: 'Merriweather', serif; font-size: 16px; font-weight: 700; color: var(--text); border-bottom: 2px solid var(--text); padding-bottom: 8px; margin: 0 0 16px 0; }

        /* Legend bar */
        .legend-bar { display: flex; justify-content: center; gap: 20px; padding: 10px 0 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; font-weight: 600; user-select: none; transition: opacity 0.15s; }
        .legend-item.inactive { opacity: 0.25; }
        .legend-item.inactive .legend-label { text-decoration: line-through; }
        .legend-swatch { width: 14px; height: 14px; }

        /* Chart */
        .chart-wrap { position: relative; }
        #chart { width: 100%; height: 420px; }

        /* Controls */
        .controls { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
        .ctrl-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
        .ctrl-group label { font-size: 12px; font-weight: 600; color: #555; }
        .ctrl-row { display: flex; align-items: center; gap: 10px; }
        .ctrl-row input[type="range"] { flex: 1; }
        .ctrl-val { font-size: 13px; font-weight: 700; min-width: 40px; }
        .policy-toggle { display: flex; align-items: center; gap: 8px; }
        .policy-toggle button { padding: 4px 14px; border: 1px solid #d4d4d0; background: #fff; font-family: 'Source Sans Pro', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; }
        .policy-toggle button.active { background: var(--text); color: #fff; border-color: var(--text); }

        /* Table */
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 16px; }
        .data-table th { text-align: left; padding: 8px 6px; border-bottom: 2px solid #d4d4d0; font-weight: 600; color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .data-table td { padding: 7px 6px; border-bottom: 1px solid #eee; }
        .data-table tr:last-child td { border-bottom: none; }
        .delta-pos { color: #16a34a; font-weight: 700; }
        .delta-neg { color: #dc2626; font-weight: 700; }
        .delta-zero { color: #aaa; }

        .source { margin-top: 14px; font-size: 11px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>International Trade and Protection</h2>

    <!-- Legend -->
    <div class="legend-bar" id="legendBar">
        <div class="legend-item" data-name="Consumer Surplus">
            <div class="legend-swatch" style="background: var(--cs);"></div>
            <span class="legend-label">Consumer Surplus</span>
        </div>
        <div class="legend-item" data-name="Producer Surplus">
            <div class="legend-swatch" style="background: var(--ps);"></div>
            <span class="legend-label">Producer Surplus</span>
        </div>
        <div class="legend-item" data-name="Revenue / Rent">
            <div class="legend-swatch" style="background: var(--rev);"></div>
            <span class="legend-label">Revenue / Rent</span>
        </div>
        <div class="legend-item" data-name="DWL">
            <div class="legend-swatch" style="background: var(--dwl);"></div>
            <span class="legend-label">Deadweight Loss</span>
        </div>
    </div>

    <!-- Chart -->
    <div class="chart-wrap">
        <div id="chart"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="ctrl-group">
            <label>World Price (Pw)</label>
            <div class="ctrl-row">
                <input type="range" id="pwSlider" min="0" max="100" value="30" step="0.5">
                <span class="ctrl-val" id="pwVal" style="color: var(--deepBlue);">30</span>
            </div>
        </div>
        <div class="ctrl-group">
            <label id="policyLabel">Tariff ($)</label>
            <div class="ctrl-row">
                <div class="policy-toggle">
                    <button id="btnTariff" class="active" onclick="setPolicy(false)">Tariff</button>
                    <button id="btnQuota" onclick="setPolicy(true)">Quota</button>
                </div>
                <input type="range" id="magSlider" min="0" max="45" value="0" step="0.5">
                <span class="ctrl-val" id="magVal" style="color: var(--ochre);">0</span>
            </div>
        </div>
    </div>

    <!-- Data Table -->
    <table class="data-table">
        <thead>
            <tr>
                <th>Variable</th>
                <th>Free Trade</th>
                <th>With Policy</th>
                <th>&Delta;</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="source">S: P = Q &nbsp;|&nbsp; D: P = 100 − Q &nbsp;|&nbsp; Equilibrium: P* = 50, Q* = 50</div>
</div>

<script>
(function() {
    var state = { pw: 30, mag: 0, isQuota: false, show: { cs: true, ps: true, rev: true, dwl: true } };
    var chart = echarts.init(document.getElementById('chart'));
    window.addEventListener('resize', function() { chart.resize(); });

    var C = { cs: '#4a7a9a', ps: '#a0616a', rev: '#5a8a6a', dwl: '#a08a50', curve: '#1a2a3a', pw: '#888', pd: '#1a2a3a', eq: '#999', proj: '#aaa' };

    function poly(name, pts, color, op) {
        return { name: name, type: 'line', data: pts, symbol: 'none', animation: false,
            lineStyle: { width: 0 }, areaStyle: { color: color, opacity: op }, silent: true };
    }

    function update() {
        var pw = state.pw, isImp = pw < 50, isEq = (pw === 50), pd;
        if (!state.isQuota) {
            pd = isImp ? Math.min(pw + state.mag, 50) : Math.max(pw - state.mag, 50);
        } else {
            if (state.mag <= 0) { pd = pw; }
            else if (isImp) { pd = Math.max(Math.min((100 - state.mag) / 2, 50), pw); }
            else { pd = Math.min(Math.max((100 + state.mag) / 2, 50), pw); }
        }
        var qsf = pw, qdf = 100 - pw, qsp = pd, qdp = 100 - pd;
        var hasPolicy = Math.abs(pd - pw) > 0.1, hasTrade = !isEq;

        var series = [
            { name: '_S', type: 'line', data: [[0, 0], [100, 100]], symbol: 'none', animation: false,
              lineStyle: { width: 2.5, color: C.curve },
              markPoint: { symbol: 'none', data: [{ coord: [96, 96], label: { show: true, formatter: 'S', fontSize: 15, fontWeight: 'bold', color: C.curve } }] } },
            { name: '_D', type: 'line', data: [[0, 100], [100, 0]], symbol: 'none', animation: false,
              lineStyle: { width: 2.5, color: C.curve },
              markPoint: { symbol: 'none', data: [{ coord: [96, 4], label: { show: true, formatter: 'D', fontSize: 15, fontWeight: 'bold', color: C.curve } }] } },
            { name: '_Pw', type: 'line', data: [[0, pw], [100, pw]], symbol: 'none', animation: false,
              lineStyle: { width: 2, type: 'dashed', color: C.pw },
              markPoint: { symbol: 'none', symbolSize: 0, data: [{ coord: [-2, pw], label: { show: true, formatter: 'Pw = ' + (Math.round(pw * 10) / 10), fontSize: 12, fontWeight: 'bold', color: C.pw } }] } },
            { name: '_Pd', type: 'line', data: hasPolicy && hasTrade ? [[0, pd], [Math.max(qsp, qdp) + 2, pd]] : [], symbol: 'none', animation: false,
              lineStyle: { width: 2, color: C.pd },
              markPoint: { symbol: 'none', symbolSize: 0, data: hasPolicy && hasTrade ? [{ coord: [-2, pd], label: { show: true, formatter: 'Pd = ' + pd.toFixed(1), fontSize: 12, fontWeight: 'bold', color: C.pd } }] : [] } },
            { name: '_EqH', type: 'line', data: [[0, 50], [50, 50]], symbol: 'none', animation: false, lineStyle: { width: 1, type: 'dotted', color: C.eq } },
            { name: '_EqV', type: 'line', data: [[50, 50], [50, 0]], symbol: 'none', animation: false, lineStyle: { width: 1, type: 'dotted', color: C.eq },
              markPoint: { symbol: 'none', symbolSize: 0, data: [
                  { coord: [0, 50], label: { show: true, formatter: 'Pe=50', fontSize: 11, color: '#999' } },
                  { coord: [50, 0], label: { show: true, formatter: 'Qe=50', fontSize: 11, color: '#999', position: 'bottom' } }] } },
            // Areas
            poly('CS', [[0, 100], [0, pd], [qdp, pd], [qdp, 100], [0, 100]], C.cs, 0.15),
            poly('PS', [[0, 0], [0, pd], [qsp, pd], [qsp, 0], [0, 0]], C.ps, 0.15)
        ];

        if (hasPolicy && hasTrade) {
            var revL = Math.min(qsp, qdp), revR = Math.max(qsp, qdp);
            var revTop = Math.max(pw, pd), revBot = Math.min(pw, pd);
            series.push(poly('Rev', [[revL, revBot], [revR, revBot], [revR, revTop], [revL, revTop], [revL, revBot]], C.rev, 0.25));
            series.push(poly('DWL', [[qsf, pw], [qsp, pd], [qsp, pw], [qsf, pw]], C.dwl, 0.35));
            series.push(poly('DWL2', [[qdf, pw], [qdp, pw], [qdp, pd], [qdf, pw]], C.dwl, 0.35));
        } else {
            series.push(poly('Rev', [], C.rev, 0));
            series.push(poly('DWL', [], C.dwl, 0));
            series.push(poly('DWL2', [], C.dwl, 0));
        }

        // Projection lines
        if (hasTrade) {
            series.push({ name: '_p1', type: 'line', data: [[qsf, pw], [qsf, 0]], symbol: 'none', animation: false, lineStyle: { width: 1, type: 'dotted', color: C.proj },
                markPoint: { symbol: 'none', symbolSize: 0, data: [{ coord: [qsf, 0], label: { show: true, formatter: 'Qˢ¹', fontSize: 11, fontWeight: 'bold', color: C.proj, position: 'bottom' } }] } });
            series.push({ name: '_p2', type: 'line', data: [[qdf, pw], [qdf, 0]], symbol: 'none', animation: false, lineStyle: { width: 1, type: 'dotted', color: C.proj },
                markPoint: { symbol: 'none', symbolSize: 0, data: [{ coord: [qdf, 0], label: { show: true, formatter: 'Q⁰¹', fontSize: 11, fontWeight: 'bold', color: C.proj, position: 'bottom' } }] } });
        } else {
            series.push({ name: '_p1', type: 'line', data: [], symbol: 'none', animation: false, lineStyle: { width: 0 } });
            series.push({ name: '_p2', type: 'line', data: [], symbol: 'none', animation: false, lineStyle: { width: 0 } });
        }
        if (hasPolicy && hasTrade) {
            series.push({ name: '_p3', type: 'line', data: [[qsp, pd], [qsp, 0]], symbol: 'none', animation: false, lineStyle: { width: 1, type: 'dotted', color: C.pd },
                markPoint: { symbol: 'none', symbolSize: 0, data: [{ coord: [qsp, 0], label: { show: true, formatter: 'Qˢ²', fontSize: 11, fontWeight: 'bold', color: C.pd, position: 'bottom' } }] } });
            series.push({ name: '_p4', type: 'line', data: [[qdp, pd], [qdp, 0]], symbol: 'none', animation: false, lineStyle: { width: 1, type: 'dotted', color: C.pd },
                markPoint: { symbol: 'none', symbolSize: 0, data: [{ coord: [qdp, 0], label: { show: true, formatter: 'Q⁰²', fontSize: 11, fontWeight: 'bold', color: C.pd, position: 'bottom' } }] } });
        } else {
            series.push({ name: '_p3', type: 'line', data: [], symbol: 'none', animation: false, lineStyle: { width: 0 } });
            series.push({ name: '_p4', type: 'line', data: [], symbol: 'none', animation: false, lineStyle: { width: 0 } });
        }

        chart.setOption({
            animation: false, backgroundColor: '#fff', tooltip: { show: false },
            grid: { left: 90, right: 40, top: 30, bottom: 50 },
            xAxis: { type: 'value', min: -5, max: 110,
                name: 'Quantity', nameLocation: 'middle', nameGap: 30, nameTextStyle: { fontSize: 12, color: '#666' },
                axisLine: { show: true, lineStyle: { color: '#999' } }, axisTick: { show: false },
                splitLine: { show: true, lineStyle: { color: '#f0f0f0', type: 'solid' } },
                axisLabel: { fontSize: 10, color: '#999' } },
            yAxis: { type: 'value', min: -5, max: 110,
                name: 'Price', nameLocation: 'middle', nameGap: 50, nameTextStyle: { fontSize: 12, color: '#666' },
                axisLine: { show: true, lineStyle: { color: '#999' } }, axisTick: { show: false },
                splitLine: { show: true, lineStyle: { color: '#f0f0f0', type: 'solid' } },
                axisLabel: { fontSize: 10, color: '#999' } },
            legend: { show: false,
                selected: { 'CS': state.show.cs, 'PS': state.show.ps, 'Rev': state.show.rev, 'DWL': state.show.dwl, 'DWL2': state.show.dwl } },
            series: series
        }, true);

        // Table
        var csf = 0.5 * (100 - pw) * (100 - pw), psf = 0.5 * pw * pw;
        var csp = 0.5 * (100 - pd) * (100 - pd), psp = 0.5 * pd * pd;
        var tvf = Math.abs(qdf - qsf), tvp = Math.abs(qdp - qsp);
        var rev = Math.abs(pd - pw) * tvp;
        var dwl = Math.max(0, (csf + psf) - (csp + psp + rev));
        var rows = [
            { v: 'Price (Domestic)', f: pw, p: pd }, { v: 'Qty Supplied', f: qsf, p: qsp },
            { v: 'Qty Demanded', f: qdf, p: qdp }, { v: 'Trade Volume', f: tvf, p: tvp },
            { v: 'Consumer Surplus', f: csf, p: csp, c: C.cs }, { v: 'Producer Surplus', f: psf, p: psp, c: C.ps },
            { v: 'Revenue / Rent', f: 0, p: rev, c: C.rev }, { v: 'Deadweight Loss', f: 0, p: dwl, c: C.dwl }
        ];
        var h = '';
        for (var i = 0; i < rows.length; i++) {
            var r = rows[i], d = r.p - r.f;
            var cls = d > 0.01 ? 'delta-pos' : (d < -0.01 ? 'delta-neg' : 'delta-zero');
            h += '<tr><td style="font-weight:700;' + (r.c ? 'color:' + r.c : '') + '">' + r.v + '</td><td>' + r.f.toFixed(1) + '</td><td>' + r.p.toFixed(1) + '</td><td class="' + cls + '">' + (d > 0.01 ? '+' : '') + d.toFixed(1) + '</td></tr>';
        }
        document.getElementById('tableBody').innerHTML = h;
    }

    window.setPolicy = function(isQuota) {
        state.isQuota = isQuota;
        document.getElementById('btnTariff').classList.toggle('active', !isQuota);
        document.getElementById('btnQuota').classList.toggle('active', isQuota);
        var s = document.getElementById('magSlider');
        if (isQuota) {
            document.getElementById('policyLabel').textContent = 'Quota (allowed qty)';
            var ft = Math.abs((100 - state.pw) - state.pw);
            s.max = ft; s.value = ft; state.mag = ft;
        } else {
            document.getElementById('policyLabel').textContent = 'Tariff ($)';
            s.max = 45; s.value = 0; state.mag = 0;
        }
        document.getElementById('magVal').textContent = state.mag;
        update();
    };

    document.getElementById('pwSlider').addEventListener('input', function() {
        state.pw = parseFloat(this.value);
        document.getElementById('pwVal').textContent = state.pw;
        if (state.isQuota) {
            var ft = Math.abs((100 - state.pw) - state.pw);
            var s = document.getElementById('magSlider');
            s.max = ft;
            if (state.mag > ft) { state.mag = ft; s.value = ft; document.getElementById('magVal').textContent = state.mag; }
        }
        update();
    });

    document.getElementById('magSlider').addEventListener('input', function() {
        state.mag = parseFloat(this.value);
        document.getElementById('magVal').textContent = state.mag;
        update();
    });

    document.querySelectorAll('.legend-item').forEach(function(el) {
        el.addEventListener('click', function() {
            var n = this.getAttribute('data-name');
            var k = n === 'Consumer Surplus' ? 'cs' : n === 'Producer Surplus' ? 'ps' : n === 'Revenue / Rent' ? 'rev' : 'dwl';
            state.show[k] = !state.show[k];
            this.classList.toggle('inactive');
            update();
        });
    });

    document.getElementById('pwVal').textContent = state.pw;
    document.getElementById('magVal').textContent = state.mag;
    update();
})();
</script>
</body>
</html>
