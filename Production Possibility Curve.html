<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AP Economics: PPC and Opportunity Cost</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+Pro:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f7f7f5;
            font-family: 'Source Sans Pro', 'Segoe UI', Arial, sans-serif;
            color: #333;
            padding: 24px 16px;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d4d4d0;
            padding: 28px 32px;
        }

        h2 {
            font-family: 'Merriweather', 'Georgia', serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a2a3a;
            border-bottom: 2px solid #1a2a3a;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        .scenario-nav {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .scenario-nav button {
            padding: 8px 18px;
            cursor: pointer;
            background: #2e8b57;
            color: #fff;
            border: none;
            font-family: 'Source Sans Pro', sans-serif;
            font-weight: 600;
            font-size: 13px;
        }

        .scenario-nav button:disabled {
            background: #d4d4d0;
            cursor: not-allowed;
            color: #999;
        }

        .scenario-nav button:hover:not(:disabled) {
            background: #236b45;
        }

        #scenarioTitle {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #2e8b57;
            text-align: center;
            flex: 1;
        }

        .prompt-box {
            background: #eef9f1;
            border-left: 4px solid #2e8b57;
            padding: 12px 16px;
            margin: 12px 0;
            font-size: 14px;
            line-height: 1.5;
        }

        .section-label {
            font-family: 'Merriweather', 'Georgia', serif;
            font-size: 14px;
            font-weight: 700;
            color: #1a2a3a;
            margin: 20px 0 6px;
        }

        .chart-box {
            width: 100%;
            height: 400px;
            margin: 16px 0;
        }

        .slider-section {
            margin: 20px 0;
            padding: 12px 0;
            border-top: 1px solid #e0e0e0;
        }

        .slider-label {
            font-size: 14px;
            font-weight: 600;
            color: #1a2a3a;
            margin-bottom: 8px;
            display: block;
        }

        .slider-label span {
            color: #2e8b57;
            font-weight: 700;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            height: 6px;
            accent-color: #2e8b57;
        }

        .checkbox-section {
            margin: 16px 0;
            display: flex;
            gap: 28px;
            align-items: center;
            flex-wrap: wrap;
        }

        .checkbox-section label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .checkbox-section input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #2e8b57;
        }

        .table-section {
            margin: 16px 0;
        }

        #revealTableBtn {
            padding: 8px 18px;
            cursor: pointer;
            background: #2e8b57;
            color: #fff;
            border: none;
            font-family: 'Source Sans Pro', sans-serif;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 12px;
        }

        #revealTableBtn:hover {
            background: #236b45;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 13px;
        }

        th, td {
            padding: 7px 10px;
            border: 1px solid #e0e0e0;
        }

        th {
            background: #f5f5f3;
            font-weight: 700;
            color: #1a2a3a;
            font-size: 12px;
        }

        tr.active-row {
            background: #fff3bf;
            font-weight: bold;
        }

        .source {
            font-size: 10px;
            color: #888;
            border-top: 1px solid #e0e0e0;
            padding-top: 8px;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Production Possibilities &amp; Opportunity Cost</h2>

    <div class="scenario-nav">
        <button id="prevBtn">Previous Scenario</button>
        <div id="scenarioTitle">Loading Scenario...</div>
        <button id="nextBtn">Next Scenario</button>
    </div>

    <div id="promptBox" class="prompt-box">Loading constraints...</div>

    <div class="section-label">Production Possibility Curve</div>
    <div id="ppcChart" class="chart-box"></div>

    <div class="section-label">Opportunity Cost Curve</div>
    <div id="ocChart" class="chart-box"></div>

    <div class="slider-section">
        <label class="slider-label">Time on Rabbits: <span id="hoursVal">0.0</span> / 8 hrs</label>
        <input type="range" id="hourSlider" min="0" max="8" step="0.02" value="0">
    </div>

    <div class="checkbox-section">
        <label><input type="checkbox" id="checkPPC" checked> Show PPC Curve</label>
        <label><input type="checkbox" id="checkOC" checked> Show Opportunity Cost Curve</label>
    </div>

    <div class="table-section">
        <button id="revealTableBtn">Reveal Data Table</button>
        <div id="tableContainer" style="display: none;">
            <table id="prodTable">
                <thead>
                    <tr>
                        <th>Hours on Rabbits</th>
                        <th>Rabbits Produced</th>
                        <th>Fish Produced</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="source">Interactive PPC &amp; Opportunity Cost Simulator — AP Economics Mini Lab</div>
</div>

<script>
// ─── Color Palette ─────────────────────────────────────
const C = {
    deepBlue: '#1a5276',
    ochre: '#b85c38',
    green: '#2e8b57',
    gray: '#bbb',
    titleText: '#1a2a3a',
    gridLine: '#e8e8e8',
};

// ─── Scenario Data ─────────────────────────────────────
const scenarios = [
    {
        name: "1. Constant Opportunity Cost",
        desc: "A hunter has 8 hours. 10 rabbits/hour OR 10 fish/hour at any time.",
        rFunc: h => 10 * h,
        fFunc: h => 10 * (8 - h),
        ocFunc: h => 1.0,
        rLim: [0, 90], fLim: [0, 90], ocLim: [0, 5],
        yAxisLabel: "Fish Produced"
    },
    {
        name: "2. Increasing Opportunity Cost",
        desc: "Diminishing returns: each hour yields 1 less than the previous.",
        rFunc: h => 10.5 * h - 0.5 * h * h,
        fFunc: h => 10.5 * (8 - h) - 0.5 * (8 - h) * (8 - h),
        ocFunc: h => (2.5 + h) / (10.5 - h),
        rLim: [0, 60], fLim: [0, 60], ocLim: [0, 5],
        yAxisLabel: "Fish Produced"
    },
    {
        name: "3. Decreasing Opportunity Cost",
        desc: "Economies of scale: each hour yields more than the previous.",
        rFunc: h => h * h + h,
        fFunc: h => (8 - h) * (8 - h) + (8 - h),
        ocFunc: h => (17 - 2 * h) / (2 * h + 1),
        rLim: [0, 80], fLim: [0, 80], ocLim: [0, 18],
        yAxisLabel: "Fish Produced"
    }
];

let currentIdx = 0;
let currentHours = 0;
let ppcChart = null;
let ocChart = null;

// ─── Initialize ────────────────────────────────────────
function init() {
    ppcChart = echarts.init(document.getElementById('ppcChart'));
    ocChart = echarts.init(document.getElementById('ocChart'));

    window.addEventListener('resize', () => {
        ppcChart.resize();
        ocChart.resize();
    });

    document.getElementById('prevBtn').onclick = () => {
        if (currentIdx > 0) loadScenario(currentIdx - 1);
    };
    document.getElementById('nextBtn').onclick = () => {
        if (currentIdx < scenarios.length - 1) loadScenario(currentIdx + 1);
    };

    document.getElementById('revealTableBtn').onclick = () => {
        document.getElementById('tableContainer').style.display = 'block';
        document.getElementById('revealTableBtn').style.display = 'none';
    };

    document.getElementById('hourSlider').oninput = function () {
        currentHours = parseFloat(this.value);
        document.getElementById('hoursVal').innerText = currentHours.toFixed(1);
        highlightTableRow(Math.round(currentHours));
        render();
    };

    document.getElementById('checkPPC').onchange = render;
    document.getElementById('checkOC').onchange = render;

    loadScenario(0);
}

// ─── Load Scenario ─────────────────────────────────────
function loadScenario(idx) {
    currentIdx = idx;
    const s = scenarios[idx];

    document.getElementById('scenarioTitle').innerText = s.name;
    document.getElementById('promptBox').innerText = s.desc;
    document.getElementById('prevBtn').disabled = idx === 0;
    document.getElementById('nextBtn').disabled = idx === scenarios.length - 1;

    document.getElementById('hourSlider').value = 0;
    currentHours = 0;
    document.getElementById('hoursVal').innerText = '0.0';

    document.getElementById('tableContainer').style.display = 'none';
    document.getElementById('revealTableBtn').style.display = '';

    generateTable(s);
    highlightTableRow(0);
    render();
}

// ─── Generate Data Table ───────────────────────────────
function generateTable(s) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    for (let h = 0; h <= 8; h++) {
        const tr = document.createElement('tr');
        tr.id = 'row-' + h;
        tr.innerHTML =
            '<td>' + h + ' hr</td>' +
            '<td>' + Math.round(s.rFunc(h)) + '</td>' +
            '<td>' + Math.round(s.fFunc(h)) + '</td>';
        tbody.appendChild(tr);
    }
}

function highlightTableRow(hourInt) {
    for (let h = 0; h <= 8; h++) {
        const row = document.getElementById('row-' + h);
        if (row) row.classList.remove('active-row');
    }
    const target = document.getElementById('row-' + hourInt);
    if (target) target.classList.add('active-row');
}

// ─── Render Both Charts ────────────────────────────────
function render() {
    const sc = scenarios[currentIdx];
    const showPPC = document.getElementById('checkPPC').checked;
    const showOC = document.getElementById('checkOC').checked;

    renderPPC(sc, showPPC);
    renderOC(sc, showOC);
}

// ─── PPC Chart ─────────────────────────────────────────
function renderPPC(sc, isVisible) {
    // Full PPC curve data (100 points, h=0 to 8)
    const ppcData = [];
    for (let h = 0; h <= 8; h += 0.08) {
        ppcData.push([sc.rFunc(h), sc.fFunc(h)]);
    }

    // Active point
    const activeR = sc.rFunc(currentHours);
    const activeF = sc.fFunc(currentHours);

    // Tangent line calculation
    const OC = sc.ocFunc(currentHours);
    const deltaR = sc.rLim[1] * 0.15;
    const rStart = activeR - deltaR;
    const rEnd = activeR + deltaR;
    const fStart = activeF - OC * (rStart - activeR);
    const fEnd = activeF - OC * (rEnd - activeR);

    const series = [];

    if (isVisible) {
        // PPC curve
        series.push({
            type: 'line',
            data: ppcData,
            symbol: 'none',
            smooth: true,
            lineStyle: { color: C.deepBlue, width: 3 },
            animation: false,
            z: 2
        });

        // Tangent line (markLine)
        series.push({
            type: 'line',
            data: [],
            symbol: 'none',
            animation: false,
            z: 3,
            markLine: {
                silent: true,
                animation: false,
                symbol: 'none',
                lineStyle: { color: '#e63946', width: 1.5, type: 'dashed' },
                data: [[
                    { coord: [rStart, fStart] },
                    { coord: [rEnd, fEnd] }
                ]]
            }
        });

        // Active point scatter
        series.push({
            type: 'scatter',
            data: [[activeR, activeF]],
            symbolSize: 12,
            itemStyle: { color: C.green, borderColor: '#fff', borderWidth: 2 },
            animation: false,
            z: 10
        });

        // Reference lines (horizontal & vertical dashed)
        series.push({
            type: 'line',
            data: [],
            symbol: 'none',
            animation: false,
            z: 1,
            markLine: {
                silent: true,
                animation: false,
                symbol: 'none',
                lineStyle: { color: C.gray, width: 1, type: 'dashed' },
                data: [
                    [
                        { coord: [0, activeF] },
                        { coord: [activeR, activeF] }
                    ],
                    [
                        { coord: [activeR, 0] },
                        { coord: [activeR, activeF] }
                    ]
                ]
            }
        });
    }

    const option = {
        animation: false,
        grid: { left: 60, right: 40, top: 40, bottom: 50 },
        xAxis: {
            type: 'value',
            min: sc.rLim[0],
            max: sc.rLim[1],
            axisLine: { show: true, lineStyle: { color: '#343a40', width: 2 } },
            axisTick: { show: true, interval: 20, lineStyle: { color: '#343a40', width: 1.5 }, length: 5 },
            axisLabel: { show: true, interval: 20, color: '#555', fontSize: 12 }
        },
        yAxis: {
            type: 'value',
            min: sc.fLim[0],
            max: sc.fLim[1],
            axisLine: { show: true, lineStyle: { color: '#343a40', width: 2 } },
            axisTick: { show: true, interval: 20, lineStyle: { color: '#343a40', width: 1.5 }, length: 5 },
            axisLabel: { show: true, interval: 20, color: '#555', fontSize: 12 }
        },
        series: series,
        graphic: [
            {
                type: 'text',
                left: 'center',
                top: 8,
                style: {
                    text: sc.yAxisLabel,
                    font: '600 13px Source Sans Pro, sans-serif',
                    fill: C.titleText
                }
            },
            {
                type: 'text',
                right: 40,
                bottom: 10,
                style: {
                    text: 'Rabbits Produced',
                    font: '600 13px Source Sans Pro, sans-serif',
                    fill: C.titleText
                }
            }
        ]
    };

    ppcChart.setOption(option, true);
}

// ─── OC Chart ──────────────────────────────────────────
function renderOC(sc, isVisible) {
    // Full OC curve data
    const ocData = [];
    for (let h = 0; h <= 8; h += 0.08) {
        ocData.push([sc.rFunc(h), sc.ocFunc(h)]);
    }

    const activeR = sc.rFunc(currentHours);
    const activeOC = sc.ocFunc(currentHours);

    const series = [];

    if (isVisible) {
        // OC curve
        series.push({
            type: 'line',
            data: ocData,
            symbol: 'none',
            smooth: true,
            lineStyle: { color: C.ochre, width: 3 },
            animation: false,
            z: 2
        });

        // Active point
        series.push({
            type: 'scatter',
            data: [[activeR, activeOC]],
            symbolSize: 12,
            itemStyle: { color: C.green, borderColor: '#fff', borderWidth: 2 },
            animation: false,
            z: 10
        });

        // Reference lines
        series.push({
            type: 'line',
            data: [],
            symbol: 'none',
            animation: false,
            z: 1,
            markLine: {
                silent: true,
                animation: false,
                symbol: 'none',
                lineStyle: { color: C.gray, width: 1, type: 'dashed' },
                data: [
                    [
                        { coord: [0, activeOC] },
                        { coord: [activeR, activeOC] }
                    ],
                    [
                        { coord: [activeR, 0] },
                        { coord: [activeR, activeOC] }
                    ]
                ]
            }
        });
    }

    const option = {
        animation: false,
        grid: { left: 60, right: 40, top: 40, bottom: 50 },
        xAxis: {
            type: 'value',
            min: sc.rLim[0],
            max: sc.rLim[1],
            axisLine: { show: true, lineStyle: { color: '#343a40', width: 2 } },
            axisTick: { show: true, interval: 20, lineStyle: { color: '#343a40', width: 1.5 }, length: 5 },
            axisLabel: { show: true, interval: 20, color: '#555', fontSize: 12 }
        },
        yAxis: {
            type: 'value',
            min: sc.ocLim[0],
            max: sc.ocLim[1],
            axisLine: { show: true, lineStyle: { color: '#343a40', width: 2 } },
            axisTick: { show: true, interval: 20, lineStyle: { color: '#343a40', width: 1.5 }, length: 5 },
            axisLabel: { show: true, interval: 20, color: '#555', fontSize: 12 }
        },
        series: series,
        graphic: [
            {
                type: 'text',
                left: 'center',
                top: 8,
                style: {
                    text: 'Opportunity Cost of Rabbit (in Fish)',
                    font: '600 13px Source Sans Pro, sans-serif',
                    fill: C.titleText
                }
            },
            {
                type: 'text',
                right: 40,
                bottom: 10,
                style: {
                    text: 'Rabbits Produced',
                    font: '600 13px Source Sans Pro, sans-serif',
                    fill: C.titleText
                }
            }
        ]
    };

    ocChart.setOption(option, true);
}

// ─── Start ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
